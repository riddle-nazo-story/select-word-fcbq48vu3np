<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SELECT WORD | CONTROL</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#090909; --panel:#151515; --fg:#f5f5f5; --muted:#999;
      --line:#303030; --yellow:#ffd400;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;padding:22px;background:var(--bg);color:var(--fg);font-family:"Noto Sans JP",system-ui,sans-serif}
    .wrap{width:min(100%,720px);margin:0 auto}
    h1{margin:0 0 6px;font-size:24px;letter-spacing:.06em}
    .sub{margin:0 0 22px;color:var(--muted);font-size:14px}
    .panel{margin-bottom:16px;padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}
    .panel-title{margin:0 0 14px;font-size:15px;color:#ccc}
    .room{margin-bottom:14px;color:var(--muted);font-size:13px}
    label{display:block;margin-bottom:7px;color:#bbb;font-size:13px}
    input{width:100%;height:58px;padding:0 16px;border:1px solid #444;border-radius:12px;outline:none;background:#0d0d0d;color:white;font:inherit;font-size:18px}
    input:focus{border-color:var(--yellow)}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{min-height:58px;padding:0 18px;border:1px solid #555;border-radius:12px;background:#1d1d1d;color:var(--fg);font:inherit;font-weight:700;cursor:pointer}
    button.primary{border-color:var(--yellow);background:var(--yellow);color:#111}
    button.danger{border-color:#633;color:#ffb0b0}
    button:disabled{opacity:.4;cursor:default}
    .request{display:none;border-color:#7b6814;box-shadow:0 0 0 1px rgba(255,212,0,.15) inset}
    .request.active{display:block}
    .notice{margin-bottom:13px;color:var(--yellow);font-weight:700}
    .current{color:var(--muted);font-size:14px;line-height:1.7}
    .message{min-height:1.5em;margin-top:12px;font-size:14px}
    .ok{color:#aef0bf}.ng{color:#ffaaaa}
    .timer-readout{margin-bottom:14px;font-family:ui-monospace,monospace;font-size:38px;font-weight:900;letter-spacing:.08em}
    .volume-row{display:grid;grid-template-columns:1fr 72px;gap:12px;align-items:center}
    input[type="range"]{height:auto;padding:0;border:none;background:transparent}
    .volume-value{text-align:center;font-family:ui-monospace,monospace;font-size:16px;color:#ddd}
    .bgm-status{margin-top:12px;color:var(--muted);font-size:14px}
    .audio-health{margin-top:12px;padding:12px;border:1px solid #333;border-radius:10px;background:#0d0d0d;font-size:13px;line-height:1.7}
    select{width:100%;height:54px;padding:0 12px;border:1px solid #444;border-radius:12px;background:#0d0d0d;color:white;font:inherit}
  </style>
</head>
<body>
<main class="wrap">
  <h1>SELECT WORD CONTROL</h1>
  <p class="sub">判定・動画・制限時間・BGMを操作します。</p>

  <section class="panel">
    <div id="roomText" class="room"></div>
    <h2 class="panel-title">ゲーム進行</h2>
    <div id="timerReadout" class="timer-readout">20:00</div>
    <div class="grid2">
      <button id="startGame" class="primary">20分タイマー開始</button>
      <button id="pauseTimer">タイマー停止</button>
      <button id="resumeTimer">タイマー再開</button>
      <button id="resetGame" class="danger">公演リセット</button>
      <button id="breakSystem" class="danger">システム崩壊</button>
      <button id="showReady">判定ボタン表示</button>
    </div>
    <div id="current" class="current" style="margin-top:14px">現在の状態：確認中…</div>
  </section>

  <section class="panel">
    <h2 class="panel-title">ゲーム中BGM</h2>
    <div class="grid2">
      <button id="playNormalBgm" class="primary">通常BGMを流す</button>
      <button id="playLast5Bgm">ラスト5分BGMを流す</button>
      <button id="stopBgm" class="danger">BGMを停止</button>
      <button id="restartBgm">現在のBGMを最初から</button>
    </div>

    <div style="margin-top:16px">
      <label for="bgmVolume">BGM音量</label>
      <div class="volume-row">
        <input id="bgmVolume" type="range" min="0" max="100" value="70">
        <div id="bgmVolumeValue" class="volume-value">70%</div>
      </div>
    </div>

    <div style="margin-top:16px">
      <label for="effectVolume">効果音・動物音声の音量（音割れ防止）</label>
      <div class="volume-row">
        <input id="effectVolume" type="range" min="0" max="100" value="80">
        <div id="effectVolumeValue" class="volume-value">80%</div>
      </div>
    </div>

    <div id="bgmStatus" class="bgm-status">現在：停止中</div>

    <div style="margin-top:18px">
      <label for="audioTestSelect">タブレットで音声テスト</label>
      <div class="row">
        <select id="audioTestSelect">
          <option value="tone">内蔵テスト音（MP3不要）</option>
          <option value="button">button.mp3</option>
          <option value="correct">correct.mp3</option>
          <option value="incorrect">incorrect.mp3</option>
          <option value="human">human.mp3</option>
          <option value="sheep">sheep.mp3</option>
          <option value="dog">dog.mp3</option>
          <option value="cat">cat.mp3</option>
          <option value="horse">horse.mp3</option>
          <option value="cow">cow.mp3</option>
          <option value="crow">crow.mp3</option>
          <option value="tiger">tiger.mp3</option>
          <option value="incoming">incoming.mp3</option>
          <option value="bgm">bgm.mp3（3秒）</option>
          <option value="bgm5">bgm_last5.mp3（3秒）</option>
        </select>
        <button id="sendAudioTest">テスト送信</button>
      </div>
    </div>

    <div id="audioHealth" class="audio-health">タブレットの音声状態：未確認</div>
  </section>

  
  <section class="panel">
    <h2 class="panel-title">動画通信</h2>

    <label for="videoSelect">再生する動画</label>
    <select id="videoSelect">
      <option value="video/event.mp4">event.mp4</option>
      <option value="video/message1.mp4">message1.mp4</option>
      <option value="video/message2.mp4">message2.mp4</option>
      <option value="video/ending.mp4">ending.mp4</option>
    </select>

    <div class="grid2" style="margin-top:12px">
      <button id="playSelectedVideo" class="primary">選択した動画を再生</button>
      <button id="stopVideo" class="danger">動画を停止</button>
    </div>

    <p class="note" style="margin-top:12px">
      動画は <code>video</code> フォルダに配置してください。
    </p>
  </section>

<section class="panel">
    <h2 class="panel-title">画面切り替え（すべて手動）</h2>
    <div class="grid2">
      <button id="showAttention" class="primary">画面に注目してください</button>
      <button id="showSuccess">脱出成功・記録画面</button>
      <button id="showFailure" class="danger">脱出失敗画像</button>
      <button id="showReady3">判定ボタン画面へ戻す</button>
    </div>
    <div id="clearRecordStatus" class="message">記録時間：未記録</div>
    <div class="message">正解時はタイマーのみ自動停止・記録します。画像への切り替えは自動では行いません。</div>
  </section>

  <section class="panel">
    <h2 class="panel-title">正解ワード設定</h2>
    <div class="row">
      <input id="answerInput" type="text" autocomplete="off" placeholder="例：band">
      <button id="saveAnswer">保存</button>
    </div>
    <div id="answerStatus" class="message"></div>
  </section>

  <section id="requestPanel" class="panel request">
    <div class="notice">判定ボタンが押されました</div>
    <label for="wordInput">提出された言葉</label>
    <div class="row">
      <input id="wordInput" type="text" autocomplete="off" enterkeyhint="send" placeholder="言葉を入力">
      <button id="judgeSubmit" class="primary">判定する</button>
    </div>
    <div id="judgeMessage" class="message"></div>
  </section>

  <section class="panel">
    <h2 class="panel-title">その他の表示操作</h2>
    <div class="grid2">
      <button id="showDead" class="danger">充電切れ画面</button>
      <button id="showReady2">判定ボタン画面</button>
    </div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-f7Dplo95j3NYBCXHSxEBGhFXgAa35lU",
  authDomain: "select-word-01.firebaseapp.com",
  databaseURL: "https://select-word-01-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "select-word-01",
  storageBucket: "select-word-01.firebasestorage.app",
  messagingSenderId: "1014781061586",
  appId: "1:1014781061586:web:3ed1752379994818d5c00b"
};

const GAME_SECONDS = 20 * 60;
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const roomId = new URLSearchParams(location.search).get("room") || "main";
const roomRef = ref(db, `selectWord/rooms/${roomId}`);

const roomText = document.getElementById("roomText");
const answerInput = document.getElementById("answerInput");
const answerStatus = document.getElementById("answerStatus");
const requestPanel = document.getElementById("requestPanel");
const wordInput = document.getElementById("wordInput");
const judgeSubmit = document.getElementById("judgeSubmit");
const judgeMessage = document.getElementById("judgeMessage");
const current = document.getElementById("current");
const timerReadout = document.getElementById("timerReadout");
let state = {};
let timerTicker = null;

roomText.textContent = `操作ルーム：${roomId}`;

function chars(text){return Array.from(text.normalize("NFC"))}
function normalizeForCompare(text){return text.trim().normalize("NFC").toLocaleLowerCase("ja")}
function detectCharType(text){
  const v=text.trim();
  if(!v)return"empty";
  if(/^[A-Za-z]+$/.test(v))return"latin";
  if(/^[\u3040-\u309Fー]+$/.test(v))return"hiragana";
  if(/^[\u30A0-\u30FFー]+$/.test(v))return"katakana";
  if(/^[\u4E00-\u9FFF々〆ヵヶ]+$/.test(v))return"kanji";
  if(/^[0-9]+$/.test(v))return"number";
  return"mixed";
}
function buildSequence(inputRaw,answerRaw){
  const input=normalizeForCompare(inputRaw), answer=normalizeForCompare(answerRaw);
  const ic=chars(input), ac=chars(answer);
  const sequence=[input===answer?"correct":"incorrect"];
  if(detectCharType(inputRaw)===detectCharType(answerRaw))sequence.push("human");
  if(ic.length===ac.length)sequence.push("sheep");
  else if(ic.length>ac.length)sequence.push("crow");
  else sequence.push("tiger");
  ["dog","cat","horse","cow"].forEach((s,i)=>{if(ic[i]!==undefined&&ac[i]!==undefined&&ic[i]===ac[i])sequence.push(s)});
  return sequence;
}
function setMessage(el,text,error=false){el.textContent=text;el.className=`message ${error?"ng":"ok"}`}
function modeLabel(mode){
  return {dead:"充電切れ画面",ready:"判定ボタン待機",waiting:"言葉の入力待ち",playing:"音声再生中",broken:"システム崩壊",attention:"画面に注目してください",success:"脱出成功・記録画面",failure:"脱出失敗画像"}[mode]||mode||"未設定";
}

function bgmLabel(mode){
  return {
    none:"停止中",
    normal:"通常BGM",
    last5:"ラスト5分BGM"
  }[mode] || "停止中";
}
function fmt(seconds){
  const s=Math.max(0,Math.ceil(seconds));
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}
function updateTimerReadout(){
  const t=state.timer||{remainingSeconds:GAME_SECONDS,status:"idle"};
  let remaining=t.remainingSeconds??GAME_SECONDS;
  if(t.status==="running"&&t.startedAt){
    remaining=Math.max(0,(t.durationSeconds||GAME_SECONDS)-Math.floor((Date.now()-t.startedAt)/1000));
  }
  timerReadout.textContent=fmt(remaining);
}

onValue(roomRef,snapshot=>{
  state=snapshot.val()||{};
  if(document.activeElement!==answerInput)answerInput.value=state.answer||"";
  requestPanel.classList.toggle("active",state.mode==="waiting");
  judgeSubmit.disabled=state.mode!=="waiting";
  current.textContent=`現在の状態：${modeLabel(state.mode||"dead")}`;

  const timerStatus = state.timer?.status || "idle";
  document.getElementById("pauseTimer").disabled = timerStatus !== "running";
  document.getElementById("resumeTimer").disabled = timerStatus !== "paused";

  const bgmControl = state.bgmControl || {mode:"none", volume:0.7, effectVolume:.8};
  const volumePercent = Math.round((bgmControl.volume ?? 0.7) * 100);
  const effectPercent = Math.round((bgmControl.effectVolume ?? .8) * 100);

  if (document.activeElement !== document.getElementById("bgmVolume")) {
    document.getElementById("bgmVolume").value = volumePercent;
    document.getElementById("bgmVolumeValue").textContent = `${volumePercent}%`;
  }

  document.getElementById("bgmStatus").textContent =
    `現在：${bgmLabel(bgmControl.mode)} / BGM ${volumePercent}% / 効果音 ${effectPercent}%`;

  if (document.activeElement !== document.getElementById("effectVolume")) {
    document.getElementById("effectVolume").value = effectPercent;
    document.getElementById("effectVolumeValue").textContent = `${effectPercent}%`;
  }

  const device = state.audioDevice;
  const testResult = state.audioTestResult;
  document.getElementById("audioHealth").innerHTML = device
    ? `タブレット音声：<strong>${device.ready ? "準備完了" : "ファイル不足"}</strong><br>` +
      `AudioContext：${device.contextState}<br>` +
      `読込済み：${device.loadedCount}/${device.totalCount}` +
      (testResult ? `<br>直近テスト：${testResult.ok ? "成功" : "失敗"}（${testResult.key}）${testResult.message ? " / "+testResult.message : ""}` : "")
    : "タブレットの音声状態：タブレット側でセットアップ未実行";

  const clearRecord = state.clearRecord;
  document.getElementById("clearRecordStatus").textContent = clearRecord
    ? `記録時間：残り ${clearRecord.display || "--:--"}`
    : "記録時間：未記録";

  if(state.mode==="waiting")setTimeout(()=>wordInput.focus(),50);
  updateTimerReadout();
  if(!timerTicker)timerTicker=setInterval(updateTimerReadout,250);
});

document.getElementById("startGame").addEventListener("click",async()=>{
  await update(roomRef,{
    timer:{status:"running",startedAt:Date.now(),durationSeconds:GAME_SECONDS,remainingSeconds:GAME_SECONDS}
  });
});

document.getElementById("pauseTimer").addEventListener("click", async () => {
  const timer = state.timer || {};
  if (timer.status !== "running" || !timer.startedAt) return;

  const duration = timer.durationSeconds || GAME_SECONDS;
  const elapsed = Math.floor((Date.now() - timer.startedAt) / 1000);
  const remaining = Math.max(0, duration - elapsed);

  await update(roomRef, {
    timer: {
      status: "paused",
      startedAt: null,
      durationSeconds: duration,
      remainingSeconds: remaining
    }
  });
});

document.getElementById("resumeTimer").addEventListener("click", async () => {
  const timer = state.timer || {};
  if (timer.status !== "paused") return;

  const remaining = Math.max(0, timer.remainingSeconds ?? GAME_SECONDS);

  await update(roomRef, {
    timer: {
      status: "running",
      startedAt: Date.now(),
      durationSeconds: remaining,
      remainingSeconds: remaining
    }
  });
});

document.getElementById("resetGame").addEventListener("click",async()=>{
  await update(roomRef,{
    mode:"dead",
    timer:{
      status:"idle",
      startedAt:null,
      durationSeconds:GAME_SECONDS,
      remainingSeconds:GAME_SECONDS
    },
    videoCommand:null,
    clearRecord:null,
    result:null,
    requestAt:null,
    bgmControl:{
      mode:"none",
      volume:0.7,
      effectVolume:.8,
      commandId:`${Date.now()}-${Math.random().toString(36).slice(2)}`
    }
  });
  wordInput.value="";
  judgeMessage.textContent="";
});

document.getElementById("breakSystem").addEventListener("click",()=>update(roomRef,{mode:"broken"}));
document.getElementById("showReady").addEventListener("click",()=>update(roomRef,{mode:"ready"}));
document.getElementById("showReady2").addEventListener("click",()=>update(roomRef,{mode:"ready"}));
document.getElementById("showDead").addEventListener("click",()=>update(roomRef,{mode:"dead",result:null,requestAt:null}));
document.getElementById("showAttention").addEventListener("click",()=>update(roomRef,{mode:"attention"}));
document.getElementById("showSuccess").addEventListener("click",async()=>{
  if(!state.clearRecord){
    setMessage(document.getElementById("clearRecordStatus"),"先に正解判定で記録時間を保存してください。",true);
    return;
  }
  await update(roomRef,{mode:"success"});
});
document.getElementById("showFailure").addEventListener("click",()=>update(roomRef,{mode:"failure"}));
document.getElementById("showReady3").addEventListener("click",()=>update(roomRef,{mode:"ready",result:null,requestAt:null}));

document.getElementById("playNormalBgm").addEventListener("click", async () => {
  const volume = Number(document.getElementById("bgmVolume").value) / 100;
  await update(roomRef, {
    bgmControl: {
      mode: "normal",
      volume,
      effectVolume: Number(document.getElementById("effectVolume").value) / 100,
      commandId: `${Date.now()}-${Math.random().toString(36).slice(2)}`
    }
  });
});

document.getElementById("playLast5Bgm").addEventListener("click", async () => {
  const volume = Number(document.getElementById("bgmVolume").value) / 100;
  await update(roomRef, {
    bgmControl: {
      mode: "last5",
      volume,
      effectVolume: Number(document.getElementById("effectVolume").value) / 100,
      commandId: `${Date.now()}-${Math.random().toString(36).slice(2)}`
    }
  });
});

document.getElementById("stopBgm").addEventListener("click", async () => {
  const volume = Number(document.getElementById("bgmVolume").value) / 100;
  await update(roomRef, {
    bgmControl: {
      mode: "none",
      volume,
      effectVolume: Number(document.getElementById("effectVolume").value) / 100,
      commandId: `${Date.now()}-${Math.random().toString(36).slice(2)}`
    }
  });
});

document.getElementById("restartBgm").addEventListener("click", async () => {
  const currentMode = state.bgmControl?.mode || "none";
  if (currentMode === "none") return;

  const volume = Number(document.getElementById("bgmVolume").value) / 100;
  await update(roomRef, {
    bgmControl: {
      mode: currentMode,
      volume,
      effectVolume: Number(document.getElementById("effectVolume").value) / 100,
      restart: true,
      commandId: `${Date.now()}-${Math.random().toString(36).slice(2)}`
    }
  });
});

document.getElementById("bgmVolume").addEventListener("input", (event) => {
  document.getElementById("bgmVolumeValue").textContent = `${event.target.value}%`;
});

document.getElementById("bgmVolume").addEventListener("change", async (event) => {
  const volume = Number(event.target.value) / 100;
  await update(roomRef, {
    bgmControl: {
      ...(state.bgmControl || {mode:"none", effectVolume:.8}),
      volume
    }
  });
});

document.getElementById("effectVolume").addEventListener("input", event => {
  document.getElementById("effectVolumeValue").textContent = `${event.target.value}%`;
});

document.getElementById("effectVolume").addEventListener("change", async event => {
  const effectVolume = Number(event.target.value) / 100;
  await update(roomRef, {
    bgmControl: {
      ...(state.bgmControl || {mode:"none", volume:.7}),
      effectVolume
    }
  });
});

document.getElementById("sendAudioTest").addEventListener("click", async () => {
  const key = document.getElementById("audioTestSelect").value;
  await update(roomRef, {
    audioTestCommand: {
      id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
      key
    }
  });
});


document.getElementById("saveAnswer").addEventListener("click",async()=>{
  const answer=answerInput.value.trim();
  if(!answer)return setMessage(answerStatus,"正解ワードを入力してください。",true);
  try{await update(roomRef,{answer});setMessage(answerStatus,"正解ワードを保存しました。")}
  catch(e){setMessage(answerStatus,"保存に失敗しました。",true)}
});

function getCurrentRemainingSeconds(){
  const timer = state.timer || {};
  if(timer.status === "running" && timer.startedAt){
    const duration = timer.durationSeconds || GAME_SECONDS;
    const elapsed = Math.floor((Date.now() - timer.startedAt) / 1000);
    return Math.max(0, duration - elapsed);
  }
  return Math.max(0, timer.remainingSeconds ?? GAME_SECONDS);
}

function formatRecordTime(seconds){
  const safe = Math.max(0, Math.ceil(seconds));
  return `${String(Math.floor(safe/60)).padStart(2,"0")}:${String(safe%60).padStart(2,"0")}`;
}

async function submitJudgement(){
  const input=wordInput.value.trim(), answer=(state.answer||"").trim();
  if(!answer)return setMessage(judgeMessage,"先に正解ワードを保存してください。",true);
  if(!input)return setMessage(judgeMessage,"提出された言葉を入力してください。",true);
  const sequence=buildSequence(input,answer);
  const isCorrect = normalizeForCompare(input)===normalizeForCompare(answer);
  judgeSubmit.disabled=true;
  try{
    const payload = {
      mode:"playing",
      result:{
        id:`${Date.now()}-${Math.random().toString(36).slice(2)}`,
        submittedWord:input,
        isCorrect,
        sequence
      }
    };

    // 正解した瞬間に、動物音声より先にタイマーを停止して残り時間を保存
    if(isCorrect){
      const remaining = getCurrentRemainingSeconds();
      payload.timer = {
        status:"paused",
        startedAt:null,
        durationSeconds:remaining,
        remainingSeconds:remaining
      };
      payload.clearRecord = {
        remainingSeconds:remaining,
        display:formatRecordTime(remaining),
        recordedAt:Date.now()
      };
      payload.bgmControl = {
        ...(state.bgmControl || {volume:.7,effectVolume:.8}),
        mode:"none",
        commandId:`${Date.now()}-clear-stop`
      };
    }

    await update(roomRef,payload);
    wordInput.value="";
    setMessage(judgeMessage,`音声を送信しました：${sequence.join(" → ")}`);
  }catch(e){
    setMessage(judgeMessage,"判定結果の送信に失敗しました。",true);
    judgeSubmit.disabled=false;
  }
}
judgeSubmit.addEventListener("click",submitJudgement);
wordInput.addEventListener("keydown",e=>{if(e.key==="Enter")submitJudgement()});

document.getElementById("playSelectedVideo").addEventListener("click", async () => {
  const src = document.getElementById("videoSelect").value;
  await update(roomRef, {
    videoCommand: {
      id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
      src
    }
  });
});

document.getElementById("stopVideo").addEventListener("click", async () => {
  await update(roomRef, {
    videoCommand: null,
    stopVideoCommand: {
      id: `${Date.now()}-${Math.random().toString(36).slice(2)}`
    }
  });
});
