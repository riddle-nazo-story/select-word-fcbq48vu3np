<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SELECT WORD｜Presentation Display</title><style>:root{color-scheme:dark;--accent:#ffd400}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;color:#fff;font-family:system-ui,"Noto Sans JP",sans-serif}.layer{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}.layer.active{opacity:1;pointer-events:auto}img,video{width:100%;height:100%;object-fit:contain;background:#000}#black{background:#000}#waiting{background:radial-gradient(circle,#171717,#000 72%);text-align:center}.logo{font-size:clamp(36px,7vw,100px);font-weight:1000;letter-spacing:.12em}.sub{margin-top:18px;color:#aaa;letter-spacing:.18em}#unlock{z-index:20;background:#000}#unlock button{min-width:280px;min-height:74px;border:2px solid var(--accent);border-radius:16px;background:var(--accent);color:#111;font-size:20px;font-weight:900}#debug{position:fixed;z-index:30;right:10px;bottom:8px;color:#888;font-size:11px;background:#0009;padding:6px 8px;border-radius:7px}</style></head><body>
<div id="imageLayer" class="layer"><img id="image"></div><div id="videoLayer" class="layer"><video id="video" playsinline preload="auto"></video></div><div id="black" class="layer"></div><div id="waiting" class="layer active"><div><div class="logo">SELECT WORD</div><div class="sub">PRESENTATION SYSTEM</div></div></div><div id="unlock" class="layer active"><button id="unlockBtn">表示を開始</button></div><div id="debug">準備中</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getDatabase,ref,onValue,update,onDisconnect}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";const firebaseConfig={apiKey:"AIzaSyA-f7Dplo95j3NYBCXHSxEBGhFXgAa35lU",authDomain:"select-word-01.firebaseapp.com",databaseURL:"https://select-word-01-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"select-word-01",storageBucket:"select-word-01.firebasestorage.app",messagingSenderId:"1014781061586",appId:"1:1014781061586:web:3ed1752379994818d5c00b"};const db=getDatabase(initializeApp(firebaseConfig));const room=new URLSearchParams(location.search).get("room")||"main",base=`selectWord/rooms/${room}/presentation`,statusRef=ref(db,`${base}/displayStatus`);const $=id=>document.getElementById(id),layers=[$("imageLayer"),$("videoLayer"),$("black"),$("waiting")],video=$("video"),image=$("image"),debug=$("debug");let unlocked=false,state={},config={story:[],noStory:[]},lastKey="",lastCmd="",stopPoints=[],used=new Set(),autoLock=false,session="";
function show(el){layers.forEach(x=>x.classList.toggle("active",x===el));sendStatus()};function active(){if($("black").classList.contains("active"))return"black";if($("waiting").classList.contains("active"))return"waiting";if($("videoLayer").classList.contains("active"))return"video";if($("imageLayer").classList.contains("active"))return"image";return"unknown"}function cur(){return(config[state.mode||"story"]||[])[Number(state.index)||0]||null}function sendStatus(extra={}){return update(statusRef,{ready:unlocked,displayMode:active(),playbackState:video.paused?(video.currentTime>0?"paused":"stopped"):"playing",currentTime:Number(video.currentTime||0),updatedAt:Date.now(),...extra}).catch(()=>{})}
async function load(force=false){let s=cur();if(!s)return;let key=`${state.mode}:${state.index}:${s.id}:${s.src}`;if(!force&&key===lastKey)return;lastKey=key;video.pause();video.removeAttribute("src");video.load();image.removeAttribute("src");stopPoints=(s.stopPoints||[]).map(Number).filter(Number.isFinite).sort((a,b)=>a-b);used.clear();autoLock=false;if(s.type==="video"){video.src=s.src;video.load();show($("videoLayer"))}else if(s.type==="image"){image.src=s.src;show($("imageLayer"))}else if(s.type==="black")show($("black"));else show($("waiting"));debug.textContent=`${state.mode} / ${(Number(state.index)||0)+1} / ${s.type}`}
async function playback(p){if(!p?.commandId||p.commandId===lastCmd)return;lastCmd=p.commandId;let s=cur();if(s?.type!=="video")return;if(Array.isArray(p.stopPoints))stopPoints=p.stopPoints.map(Number).filter(Number.isFinite).sort((a,b)=>a-b);try{if(p.action==="playFromStart"){session=p.sessionId||p.commandId;used.clear();autoLock=false;video.currentTime=0;show($("videoLayer"));await video.play()}else if(p.action==="resume"){autoLock=false;show($("videoLayer"));await video.play()}else if(p.action==="pause")video.pause();else if(p.action==="stop"){video.pause();video.currentTime=0;used.clear();autoLock=false}sendStatus()}catch(e){debug.textContent=`再生失敗：${e.message}`;sendStatus({playbackState:"blocked",error:e.message})}}
$("unlockBtn").onclick=async()=>{unlocked=true;$("unlock").classList.remove("active");try{await document.documentElement.requestFullscreen?.()}catch{}sendStatus({ready:true})};onDisconnect(statusRef).set({ready:false,updatedAt:Date.now()});onValue(ref(db,`${base}/config`),s=>{if(s.exists()){config=s.val();load(true)}});onValue(ref(db,base),s=>{let v=s.val()||{};state=v;if(v.displayMode==="black")show($("black"));else if(v.displayMode==="waiting")show($("waiting"));else load();playback(v.playback)});
video.addEventListener("timeupdate",async()=>{if(video.paused||autoLock)return;let p=stopPoints.find(x=>x>0&&!used.has(x)&&video.currentTime>=x-.12);if(p==null)return;autoLock=true;used.add(p);video.pause();try{video.currentTime=p}catch{}debug.textContent=`自動停止 ${p}秒`;await sendStatus({playbackState:"autoPaused",autoPausedAt:p,currentTime:p});setTimeout(()=>autoLock=false,250)});video.addEventListener("play",()=>sendStatus({playbackState:"playing",autoPausedAt:null}));video.addEventListener("pause",()=>{if(!autoLock)sendStatus()});video.addEventListener("ended",()=>sendStatus({playbackState:"ended"}));video.addEventListener("error",()=>{debug.textContent="動画を読み込めません。パスを確認してください。";sendStatus({playbackState:"error"})});image.addEventListener("error",()=>debug.textContent="画像を読み込めません。パスを確認してください。");
</script></body></html>
