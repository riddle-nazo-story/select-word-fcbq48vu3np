<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SELECT WORD | DISPLAY</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --fg: #f5f5f5;
      --muted: #8b8b8b;
      --yellow: #ffd400;
      --yellow-dark: #9e7d00;
      --danger: #ff2d2d;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Sans JP", system-ui, sans-serif;
    }

    body { display: grid; place-items: center; }

    .timer {
      display: none;
      position: fixed;
      top: 18px;
      left: 50%;
      z-index: 50;
      transform: translateX(-50%);
      min-width: 180px;
      padding: 10px 18px;
      border: 1px solid #454545;
      border-radius: 999px;
      background: rgba(5,5,5,.82);
      backdrop-filter: blur(8px);
      color: #fff;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: .08em;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }

    .timer.visible { display: block; }

    .timer.warning {
      border-color: var(--danger);
      color: #ff7373;
      animation: timerPulse 1s infinite;
    }

    @keyframes timerPulse {
      50% { transform: translateX(-50%) scale(1.04); }
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 90px 5vw 5vw;
      text-align: center;
    }

    .screen.active { display: flex; }

    .battery-wrap {
      position: relative;
      width: min(42vw, 360px);
      aspect-ratio: 2 / 1;
      border: min(1.6vw, 12px) solid var(--fg);
      border-radius: min(3vw, 24px);
    }

    .battery-wrap::after {
      content: "";
      position: absolute;
      top: 28%;
      right: min(-5vw, -32px);
      width: min(4vw, 28px);
      height: 44%;
      background: var(--fg);
      border-radius: 0 8px 8px 0;
    }

    .battery-low {
      position: absolute;
      left: 7%;
      top: 10%;
      bottom: 10%;
      width: 12%;
      border-radius: 8px;
      background: #cfcfcf;
      animation: blink 1.2s infinite;
    }

    .dead-text {
      margin-top: 4vh;
      color: var(--muted);
      font-size: clamp(18px, 3vw, 34px);
      letter-spacing: .12em;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      50%, 100% { opacity: .2; }
    }

    .judge-label {
      margin-bottom: 3vh;
      color: #9da4aa;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(13px, 1.8vw, 20px);
      letter-spacing: .28em;
    }

    .judge-console {
      position: relative;
      display: grid;
      place-items: center;
      width: min(58vw, 430px);
      aspect-ratio: 1;
      border: 2px solid #3b3f43;
      border-radius: 34px;
      background:
        linear-gradient(145deg, #202327, #0b0d0f 72%),
        #111;
      box-shadow:
        0 30px 60px rgba(0,0,0,.55),
        inset 0 0 0 7px #090a0b,
        inset 0 0 0 9px #30343a;
    }

    .judge-console::before,
    .judge-console::after {
      content: "";
      position: absolute;
      width: 12px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #050505;
      border: 1px solid #555;
      box-shadow: 0 0 0 2px #151515;
    }

    .judge-console::before { top: 18px; left: 18px; }
    .judge-console::after { right: 18px; bottom: 18px; }

    .judge-ring {
      position: relative;
      display: grid;
      place-items: center;
      width: 74%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #333 0 54%, #151719 55% 64%, #555 65% 67%, #111 68%);
      box-shadow: inset 0 0 22px #000, 0 10px 22px rgba(0,0,0,.55);
    }

    .judge-button {
      position: relative;
      width: 72%;
      aspect-ratio: 1;
      border: 2px solid #ffe86e;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 28%, #fff08b 0 5%, #ffd400 28%, #e7ad00 72%, #8b6500 100%);
      color: #171300;
      font-size: clamp(30px, 5.4vw, 58px);
      font-weight: 900;
      letter-spacing: .12em;
      cursor: pointer;
      box-shadow:
        0 13px 0 #735600,
        0 18px 28px rgba(0,0,0,.6),
        inset 0 3px 8px rgba(255,255,255,.72),
        inset 0 -10px 18px rgba(109,70,0,.25);
      transition: transform .08s ease, box-shadow .08s ease, filter .15s;
      touch-action: manipulation;
    }

    .judge-button::after {
      content: "PUSH TO JUDGE";
      position: absolute;
      left: 50%;
      bottom: 17%;
      transform: translateX(-50%);
      width: 100%;
      font-family: ui-monospace, monospace;
      font-size: clamp(8px, 1.1vw, 12px);
      letter-spacing: .18em;
      opacity: .62;
    }

    .judge-button:active,
    .judge-button.pressed {
      transform: translateY(9px);
      box-shadow:
        0 4px 0 #735600,
        0 9px 15px rgba(0,0,0,.55),
        inset 0 3px 8px rgba(255,255,255,.5);
    }

    .judge-button:disabled {
      cursor: default;
      filter: brightness(.42) saturate(.45);
      transform: translateY(9px);
      box-shadow: 0 4px 0 #453500, 0 9px 15px rgba(0,0,0,.55);
    }

    .audio-unlock {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 400;
      transform: translateX(-50%);
      padding: 13px 20px;
      border: 1px solid #ffd400;
      border-radius: 999px;
      background: rgba(13,13,13,.92);
      color: #ffd400;
      font: 700 14px/1 system-ui, sans-serif;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      cursor: pointer;
    }

    .audio-unlock.hidden { display: none; }

    .waiting-text {
      min-height: 1.5em;
      margin-top: 5vh;
      color: var(--muted);
      font-size: clamp(16px, 2.5vw, 28px);
      letter-spacing: .1em;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 8vh 5vw 5vw;
      background:
        radial-gradient(circle at center, rgba(28,50,65,.38), rgba(0,0,0,.92) 70%),
        rgba(0,0,0,.9);
    }

    .video-overlay.active { display: flex; }

    .video-shell {
      position: relative;
      width: min(88vw, 1100px);
      padding: 18px;
      border: 2px solid #74dbff;
      border-radius: 18px;
      background: rgba(4,13,18,.92);
      box-shadow:
        0 0 0 4px rgba(116,219,255,.12),
        0 0 55px rgba(44,184,255,.28),
        inset 0 0 40px rgba(44,184,255,.08);
      clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
    }

    .video-shell::before,
    .video-shell::after {
      content: "";
      position: absolute;
      z-index: 2;
      width: 92px;
      height: 3px;
      background: #74dbff;
      box-shadow: 0 0 14px #74dbff;
    }

    .video-shell::before { top: 8px; left: 34px; }
    .video-shell::after { right: 34px; bottom: 8px; }

    .video-title {
      margin: 0 0 12px;
      color: #9ee8ff;
      font-family: ui-monospace, monospace;
      font-size: clamp(12px, 1.7vw, 18px);
      letter-spacing: .22em;
      text-align: left;
    }

    .video-shell video {
      display: block;
      width: 100%;
      max-height: 72vh;
      border: 1px solid rgba(116,219,255,.35);
      border-radius: 8px;
      background: #000;
    }

    .broken {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      overflow: hidden;
      background: #050505;
    }

    .broken.active { display: block; }

    .broken::before {
      content: "";
      position: absolute;
      inset: -30%;
      background:
        repeating-linear-gradient(0deg, transparent 0 4px, rgba(255,255,255,.08) 5px 6px),
        linear-gradient(90deg, rgba(255,0,0,.13), transparent 35%, rgba(0,170,255,.12));
      animation: noiseMove .14s steps(2) infinite;
    }

    .broken-message {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 90%;
      transform: translate(-50%,-50%);
      color: #ff3838;
      font-family: ui-monospace, monospace;
      font-size: clamp(34px, 8vw, 100px);
      font-weight: 900;
      letter-spacing: .08em;
      text-shadow: 4px 0 #0ff, -4px 0 #f0f;
      animation: glitch .16s infinite;
    }

    .broken-sub {
      display: block;
      margin-top: 22px;
      color: #ddd;
      font-size: clamp(14px, 2.2vw, 28px);
      letter-spacing: .22em;
    }

    @keyframes noiseMove {
      0% { transform: translate(0,0); }
      25% { transform: translate(3%,-2%); }
      50% { transform: translate(-2%,3%); }
      75% { transform: translate(1%,-3%); }
    }

    @keyframes glitch {
      0%, 100% { transform: translate(-50%,-50%) skew(0deg); opacity: 1; }
      20% { transform: translate(-51%,-49%) skew(2deg); }
      40% { transform: translate(-49%,-52%) skew(-3deg); opacity: .7; }
      60% { transform: translate(-52%,-48%) skew(1deg); }
      80% { transform: translate(-48%,-51%) skew(-2deg); }
    }

    .status {
      position: fixed;
      right: 14px;
      bottom: 10px;
      z-index: 250;
      color: #444;
      font-size: 11px;
    }

    .error {
      position: fixed;
      z-index: 300;
      inset: auto 20px 20px;
      display: none;
      padding: 12px 16px;
      border: 1px solid #633;
      border-radius: 10px;
      background: #211;
      color: #faa;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="timer" class="timer">20:00</div>

  <main id="deadScreen" class="screen active">
    <div class="battery-wrap"><div class="battery-low"></div></div>
    <div class="dead-text">BATTERY EMPTY</div>
  </main>

  <main id="judgeScreen" class="screen">
    <div class="judge-label">SELECT WORD SYSTEM</div>
    <div class="judge-console"><div class="judge-ring"><button id="judgeButton" class="judge-button" type="button">判 定</button></div></div>
    <div id="waitingText" class="waiting-text"></div>
  </main>

  <section id="videoOverlay" class="video-overlay">
    <div class="video-shell">
      <div class="video-title">INCOMING TRANSMISSION</div>
      <video id="eventVideo" playsinline></video>
    </div>
  </section>

  <section id="brokenScreen" class="broken">
    <div class="broken-message">
      SYSTEM FAILURE
      <span class="broken-sub">CONNECTION LOST / FATAL ERROR</span>
    </div>
  </section>

  <button id="audioUnlock" class="audio-unlock" type="button">タップして音声を有効化</button>

  <div id="status" class="status">接続中...</div>
  <div id="error" class="error"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-f7Dplo95j3NYBCXHSxEBGhFXgAa35lU",
      authDomain: "select-word-01.firebaseapp.com",
      databaseURL: "https://select-word-01-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "select-word-01",
      storageBucket: "select-word-01.firebasestorage.app",
      messagingSenderId: "1014781061586",
      appId: "1:1014781061586:web:3ed1752379994818d5c00b"
    };

    const AUDIO_FILES = {
      correct: "audio/correct.mp3",
      incorrect: "audio/incorrect.mp3",
      human: "audio/human.mp3",
      sheep: "audio/sheep.mp3",
      dog: "audio/dog.mp3",
      cat: "audio/cat.mp3",
      horse: "audio/horse.mp3",
      cow: "audio/cow.mp3",
      crow: "audio/crow.mp3",
      tiger: "audio/tiger.mp3",
      button: "audio/button.mp3",
      incoming: "audio/incoming.mp3",
      bgm: "audio/bgm.mp3",
      bgm5: "audio/bgm_last5.mp3"
    };

    const GAME_SECONDS = 20 * 60;

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const roomId = new URLSearchParams(location.search).get("room") || "main";
    const roomRef = ref(db, `selectWord/rooms/${roomId}`);

    const deadScreen = document.getElementById("deadScreen");
    const judgeScreen = document.getElementById("judgeScreen");
    const judgeButton = document.getElementById("judgeButton");
    const waitingText = document.getElementById("waitingText");
    const timerEl = document.getElementById("timer");
    const videoOverlay = document.getElementById("videoOverlay");
    const eventVideo = document.getElementById("eventVideo");
    const brokenScreen = document.getElementById("brokenScreen");
    const status = document.getElementById("status");
    const errorBox = document.getElementById("error");
    const audioUnlock = document.getElementById("audioUnlock");

    let currentMode = "dead";
    let lastResultId = "";
    let lastVideoCommandId = "";
    let isPlayingResult = false;
    let timerInterval = null;
    let currentTimerState = null;
    let bgmMode = "none";
    let pausedBgmMode = "none";
    let bgmSuppressed = false;
    let requestedBgmMode = "none";
    let requestedBgmVolume = 0.7;
    let lastBgmCommandId = "";

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const audioContext = AudioContextClass ? new AudioContextClass() : null;
    const effectGain = audioContext ? audioContext.createGain() : null;

    // 正解・不正解・動物音声・ボタン音などを3倍に増幅
    if (effectGain) {
      effectGain.gain.value = 3;
      effectGain.connect(audioContext.destination);
    }

    const audioCache = {};
    const mediaSources = {};

    for (const [key, src] of Object.entries(AUDIO_FILES)) {
      const audio = new Audio(new URL(src, location.href).href);
      audio.preload = "auto";

      if (key === "bgm" || key === "bgm5") {
        audio.loop = true;
      } else if (audioContext && effectGain) {
        try {
          const source = audioContext.createMediaElementSource(audio);
          source.connect(effectGain);
          mediaSources[key] = source;
        } catch (error) {
          console.warn(`音声増幅の接続に失敗しました: ${key}`, error);
        }
      }

      audioCache[key] = audio;
    }

    async function unlockAudio() {
      if (audioContext && audioContext.state !== "running") {
        try {
          await audioContext.resume();
        } catch (_) {}
      }

      const attempts = Object.values(audioCache).map(async (audio) => {
        const oldMuted = audio.muted;
        audio.muted = true;
        try {
          await audio.play();
          audio.pause();
          audio.currentTime = 0;
        } catch (_) {
          // 個別ファイルが未配置でも、他の音声は有効化を続行する
        } finally {
          audio.muted = oldMuted;
        }
      });
      await Promise.allSettled(attempts);
      audioUnlock.classList.add("hidden");
    }

    audioUnlock.addEventListener("click", unlockAudio);
    document.addEventListener("pointerdown", () => {
      if (!audioUnlock.classList.contains("hidden")) unlockAudio();
    }, { once: true });

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function showScreen(mode) {
      currentMode = mode;
      timerEl.classList.toggle("visible", mode !== "dead");
      deadScreen.classList.toggle("active", mode === "dead");
      judgeScreen.classList.toggle("active", mode !== "dead");

      const waiting = mode === "waiting";
      const playing = mode === "playing";
      judgeButton.disabled = waiting || playing;
      judgeButton.classList.toggle("pressed", waiting || playing);
      waitingText.textContent =
        waiting ? "判定を受け付けました" :
        playing ? "判定中…" : "";
    }

    function playAudio(key) {
      return new Promise(async (resolve) => {
        const audio = audioCache[key];
        if (!audio) return resolve();

        if (audioContext && audioContext.state !== "running") {
          try {
            await audioContext.resume();
          } catch (_) {}
        }

        audio.pause();
        audio.currentTime = 0;

        let finished = false;
        const finish = () => {
          if (finished) return;
          finished = true;
          audio.removeEventListener("ended", finish);
          audio.removeEventListener("error", finish);
          resolve();
        };

        audio.addEventListener("ended", finish);
        audio.addEventListener("error", finish);

        try {
          await audio.play();
        } catch (error) {
          console.error(`音声再生失敗: ${key}`, error);
          showError(`${AUDIO_FILES[key]} を再生できませんでした。`);
          finish();
        }
      });
    }

    function stopBgm(resetPosition = true) {
      for (const key of ["bgm", "bgm5"]) {
        const audio = audioCache[key];
        audio.pause();
        if (resetPosition) audio.currentTime = 0;
      }
      if (resetPosition) {
        bgmMode = "none";
        pausedBgmMode = "none";
      }
    }

    function pauseBgmForJudgement() {
      bgmSuppressed = true;
      pausedBgmMode = bgmMode;

      for (const key of ["bgm", "bgm5"]) {
        audioCache[key].pause();
      }
    }

    function resumeBgmAfterJudgement() {
      bgmSuppressed = false;
      pausedBgmMode = "none";

      if (requestedBgmMode === "none") return;
      if (!currentTimerState || currentTimerState.status !== "running") return;

      playRequestedBgm(false);
    }

    function setBgmVolume(volume) {
      requestedBgmVolume = Math.max(0, Math.min(1, Number(volume) || 0));
      audioCache.bgm.volume = requestedBgmVolume;
      audioCache.bgm5.volume = requestedBgmVolume;
    }

    function playRequestedBgm(resetPosition = false) {
      if (bgmSuppressed || requestedBgmMode === "none") return;

      const key = requestedBgmMode === "last5" ? "bgm5" : "bgm";
      const otherKey = key === "bgm" ? "bgm5" : "bgm";

      audioCache[otherKey].pause();

      if (resetPosition) {
        audioCache[key].currentTime = 0;
      }

      audioCache[key].volume = requestedBgmVolume;
      audioCache[key].play().catch(() => {
        showError(key === "bgm5"
          ? "bgm_last5.mp3 を再生できませんでした。"
          : "bgm.mp3 を再生できませんでした。");
      });

      bgmMode = requestedBgmMode;
    }

    function applyBgmControl(bgmControl = {}) {
      const commandChanged =
        bgmControl.commandId &&
        bgmControl.commandId !== lastBgmCommandId;

      if (commandChanged) {
        lastBgmCommandId = bgmControl.commandId;
      }

      requestedBgmMode = bgmControl.mode || "none";
      setBgmVolume(bgmControl.volume ?? 0.7);

      if (requestedBgmMode === "none") {
        stopBgm(false);
        bgmMode = "none";
        return;
      }

      if (bgmSuppressed) return;
      if (!currentTimerState || currentTimerState.status !== "running") return;

      const expectedKey = requestedBgmMode === "last5" ? "bgm5" : "bgm";
      const shouldReset =
        bgmMode !== requestedBgmMode ||
        (commandChanged && bgmControl.restart === true);

      playRequestedBgm(shouldReset);

      if (audioCache[expectedKey].paused) {
        playRequestedBgm(false);
      }
    }

    async function playResult(result) {
      if (isPlayingResult || !result?.id || result.id === lastResultId) return;
      isPlayingResult = true;
      lastResultId = result.id;

      // 念のため、判定音声中は必ずBGMを停止
      if (!bgmSuppressed) pauseBgmForJudgement();

      await update(roomRef, { mode: "playing" });
      showScreen("playing");

      const sequence = Array.isArray(result.sequence) ? result.sequence : [];

      for (let i = 0; i < sequence.length; i++) {
        await playAudio(sequence[i]);

        // 各音声の間を1秒空ける
        if (i < sequence.length - 1) {
          await new Promise(resolve => setTimeout(resolve, 1000));
        }
      }

      // 最後の音声後も1秒空けてからBGMを再開
      await new Promise(resolve => setTimeout(resolve, 1000));
      resumeBgmAfterJudgement();

      await update(roomRef, { mode: "ready", requestAt: null, result: null });
      showScreen("ready");
      isPlayingResult = false;
    }

    async function playVideoCommand(command) {
      if (!command?.id || command.id === lastVideoCommandId) return;
      lastVideoCommandId = command.id;

      try {
        await playAudio("incoming");
        eventVideo.src = command.src || "video/event.mp4";
        videoOverlay.classList.add("active");
        eventVideo.currentTime = 0;
        await eventVideo.play();

        await new Promise(resolve => {
          const done = () => resolve();
          eventVideo.addEventListener("ended", done, { once: true });
          eventVideo.addEventListener("error", done, { once: true });
        });
      } catch (error) {
        console.error(error);
        showError("動画を再生できませんでした。");
      } finally {
        eventVideo.pause();
        eventVideo.removeAttribute("src");
        eventVideo.load();
        videoOverlay.classList.remove("active");
        await update(roomRef, { videoCommand: null });
      }
    }

    function formatTime(seconds) {
      const safe = Math.max(0, Math.ceil(seconds));
      const min = Math.floor(safe / 60);
      const sec = safe % 60;
      return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
    }

    function updateTimer() {
      if (!currentTimerState?.startedAt || currentTimerState.status !== "running") {
        const remaining = currentTimerState?.remainingSeconds ?? GAME_SECONDS;
        timerEl.textContent = formatTime(remaining);
        timerEl.classList.toggle("warning", remaining <= 300 && remaining > 0);

        if (currentTimerState?.status === "paused") {
          bgmSuppressed = false;
          stopBgm(false);
        }

        return;
      }

      const elapsed = Math.floor((Date.now() - currentTimerState.startedAt) / 1000);
      const duration = currentTimerState.durationSeconds || GAME_SECONDS;
      const remaining = Math.max(0, duration - elapsed);

      timerEl.textContent = formatTime(remaining);
      timerEl.classList.toggle("warning", remaining <= 300);

      if (remaining <= 0) {
        bgmSuppressed = false;
        stopBgm(true);
        brokenScreen.classList.add("active");
        update(roomRef, {
          timer: {
            ...currentTimerState,
            status: "ended",
            remainingSeconds: 0
          },
          mode: "broken"
        }).catch(console.error);
      }
    }

    judgeButton.addEventListener("click", async () => {
      if (currentMode !== "ready") return;

      judgeButton.disabled = true;
      judgeButton.classList.add("pressed");
      waitingText.textContent = "判定を受け付けました";

      // ボタンを押した瞬間から、動物音声終了までBGMを止める
      pauseBgmForJudgement();

      // 判定ボタン専用効果音
      await playAudio("button");

      try {
        await update(roomRef, {
          mode: "waiting",
          requestAt: Date.now(),
          result: null
        });
      } catch (error) {
        showError("判定要求の送信に失敗しました。");
        judgeButton.disabled = false;
        judgeButton.classList.remove("pressed");
        waitingText.textContent = "";
        resumeBgmAfterJudgement();
      }
    });

    onValue(roomRef, (snapshot) => {
      const state = snapshot.val() || {};
      const mode = state.mode || "dead";

      if (mode !== "broken") {
        showScreen(mode);
      } else {
        timerEl.classList.add("visible");
      }
      if (mode === "dead") timerEl.classList.remove("visible");
      brokenScreen.classList.toggle("active", mode === "broken");

      currentTimerState = state.timer || { status: "idle", remainingSeconds: GAME_SECONDS };
      updateTimer();
      applyBgmControl(state.bgmControl || { mode: "none", volume: 0.7 });

      if (!timerInterval) timerInterval = setInterval(updateTimer, 250);

      if (state.result) playResult(state.result);
      if (state.videoCommand) {
        playVideoCommand(state.videoCommand);
      } else if (videoOverlay.classList.contains("active")) {
        eventVideo.pause();
        eventVideo.removeAttribute("src");
        eventVideo.load();
        videoOverlay.classList.remove("active");
      }

      if (currentTimerState.status === "idle" || currentTimerState.status === "ended") {
        bgmSuppressed = false;
        stopBgm(false);
      } else if (currentTimerState.status === "paused") {
        bgmSuppressed = false;
        stopBgm(false);
      }

      status.textContent = `ROOM: ${roomId} / ${mode}`;
    }, () => showError("Firebaseへの接続に失敗しました。"));
  </script>
</body>
</html>
