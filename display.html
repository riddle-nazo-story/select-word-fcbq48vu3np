<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- ホーム画面から起動したとき、Safariのタブ・アドレスバーを表示しない -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SELECT WORD">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050505">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

  <title>SELECT WORD | DISPLAY</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --fg: #f5f5f5;
      --muted: #8b8b8b;
      --yellow: #ffd400;
      --yellow-dark: #9e7d00;
      --danger: #ff2d2d;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Sans JP", system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
    }

    .timer {
      display: none;
      position: fixed;
      top: 18px;
      left: 50%;
      z-index: 50;
      transform: translateX(-50%);
      min-width: 180px;
      padding: 10px 18px;
      border: 1px solid #454545;
      border-radius: 999px;
      background: rgba(5,5,5,.82);
      backdrop-filter: blur(8px);
      color: #fff;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: .08em;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }

    .timer.visible { display: block; }

    .timer.warning {
      border-color: var(--danger);
      color: #ff7373;
      animation: timerPulse 1s infinite;
    }

    @keyframes timerPulse {
      50% { transform: translateX(-50%) scale(1.04); }
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 90px 5vw 5vw;
      text-align: center;
    }

    .screen.active { display: flex; }

    .battery-wrap {
      position: relative;
      width: min(42vw, 360px);
      aspect-ratio: 2 / 1;
      border: min(1.6vw, 12px) solid var(--fg);
      border-radius: min(3vw, 24px);
    }

    .battery-wrap::after {
      content: "";
      position: absolute;
      top: 28%;
      right: min(-5vw, -32px);
      width: min(4vw, 28px);
      height: 44%;
      background: var(--fg);
      border-radius: 0 8px 8px 0;
    }

    .battery-low {
      position: absolute;
      left: 7%;
      top: 10%;
      bottom: 10%;
      width: 12%;
      border-radius: 8px;
      background: #cfcfcf;
      animation: blink 1.2s infinite;
    }

    .dead-text {
      margin-top: 4vh;
      color: var(--muted);
      font-size: clamp(18px, 3vw, 34px);
      letter-spacing: .12em;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      50%, 100% { opacity: .2; }
    }

    .judge-label {
      margin-bottom: 3vh;
      color: #9da4aa;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(13px, 1.8vw, 20px);
      letter-spacing: .28em;
    }

    .judge-console {
      position: relative;
      display: grid;
      place-items: center;
      width: min(58vw, 430px);
      aspect-ratio: 1;
      border: 2px solid #3b3f43;
      border-radius: 34px;
      background:
        linear-gradient(145deg, #202327, #0b0d0f 72%),
        #111;
      box-shadow:
        0 30px 60px rgba(0,0,0,.55),
        inset 0 0 0 7px #090a0b,
        inset 0 0 0 9px #30343a;
    }

    .judge-console::before,
    .judge-console::after {
      content: "";
      position: absolute;
      width: 12px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #050505;
      border: 1px solid #555;
      box-shadow: 0 0 0 2px #151515;
    }

    .judge-console::before { top: 18px; left: 18px; }
    .judge-console::after { right: 18px; bottom: 18px; }

    .judge-ring {
      position: relative;
      display: grid;
      place-items: center;
      width: 74%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #333 0 54%, #151719 55% 64%, #555 65% 67%, #111 68%);
      box-shadow: inset 0 0 22px #000, 0 10px 22px rgba(0,0,0,.55);
    }

    .judge-button {
      position: relative;
      width: 72%;
      aspect-ratio: 1;
      border: 2px solid #ffe86e;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 28%, #fff08b 0 5%, #ffd400 28%, #e7ad00 72%, #8b6500 100%);
      color: #171300;
      font-size: clamp(30px, 5.4vw, 58px);
      font-weight: 900;
      letter-spacing: .12em;
      cursor: pointer;
      box-shadow:
        0 13px 0 #735600,
        0 18px 28px rgba(0,0,0,.6),
        inset 0 3px 8px rgba(255,255,255,.72),
        inset 0 -10px 18px rgba(109,70,0,.25);
      transition: transform .08s ease, box-shadow .08s ease, filter .15s;
      touch-action: manipulation;
    }

    .judge-button::after {
      content: "PUSH TO JUDGE";
      position: absolute;
      left: 50%;
      bottom: 17%;
      transform: translateX(-50%);
      width: 100%;
      font-family: ui-monospace, monospace;
      font-size: clamp(8px, 1.1vw, 12px);
      letter-spacing: .18em;
      opacity: .62;
    }

    .judge-button:active,
    .judge-button.pressed {
      transform: translateY(9px);
      box-shadow:
        0 4px 0 #735600,
        0 9px 15px rgba(0,0,0,.55),
        inset 0 3px 8px rgba(255,255,255,.5);
    }

    .judge-button:disabled {
      cursor: default;
      filter: brightness(.42) saturate(.45);
      transform: translateY(9px);
      box-shadow: 0 4px 0 #453500, 0 9px 15px rgba(0,0,0,.55);
    }

    .manual-screen {
      position: fixed;
      inset: 0;
      z-index: 180;
      display: none;
      place-items: center;
      overflow: hidden;
      background: #000;
    }

    .manual-screen.active { display: grid; }

    .attention-message {
      padding: 40px;
      color: #fff;
      text-align: center;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(34px, 7vw, 82px);
      letter-spacing: .16em;
      line-height: 1.7;
      text-shadow: 0 0 24px rgba(120,190,255,.75);
    }

    .result-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .clear-time-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      color: #fff;
      font-family: "Times New Roman", "Yu Mincho", serif;
      font-size: clamp(44px, 7.4vw, 86px);
      font-weight: 500;
      letter-spacing: .02em;
      white-space: nowrap;
      text-shadow: 0 0 8px #fff, 0 0 20px rgba(255,255,255,.42), 3px 3px 0 #111;
    }

    .clear-time-part {
      position: absolute;
      top: 52.85%;
      transform: translateY(-50%);
      min-width: 2.2ch;
      line-height: 1;
    }

    .clear-time-minute {
      right: 52.7%;
      text-align: right;
    }

    .clear-time-second {
      left: 52.7%;
      text-align: left;
    }

    @media (orientation: landscape) {
      .manual-screen::after {
        content: "端末を縦向きにしてください";
        position: absolute;
        z-index: 5;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(0,0,0,.92);
        color: white;
        font: 700 28px/1.5 system-ui,sans-serif;
      }
    }

    .audio-unlock {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 400;
      transform: translateX(-50%);
      padding: 13px 20px;
      border: 1px solid #ffd400;
      border-radius: 999px;
      background: rgba(13,13,13,.92);
      color: #ffd400;
      font: 700 14px/1 system-ui, sans-serif;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      cursor: pointer;
    }

    .audio-unlock.hidden { display: none; }

    body.manual-view .audio-unlock,
    body.manual-view .status,
    body.manual-view .error {
      display: none !important;
    }

    .audio-setup {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,.92);
      backdrop-filter: blur(10px);
    }

    .audio-setup.hidden { display: none; }

    .audio-card {
      width: min(680px, 100%);
      max-height: min(88vh, 820px);
      overflow: auto;
      padding: 22px;
      border: 1px solid #3c3c3c;
      border-radius: 20px;
      background: #111;
      box-shadow: 0 28px 70px rgba(0,0,0,.65);
      text-align: left;
    }

    .audio-card h2 { margin: 0 0 8px; font-size: 22px; }
    .audio-card p { margin: 0 0 16px; color: #aaa; line-height: 1.7; font-size: 14px; }

    .audio-main-button {
      width: 100%;
      min-height: 62px;
      border: 1px solid #ffd400;
      border-radius: 14px;
      background: #ffd400;
      color: #111;
      font: 900 17px/1 system-ui,sans-serif;
      cursor: pointer;
    }

    .audio-main-button:disabled { opacity: .45; cursor: default; }

    .audio-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .audio-secondary-button {
      min-height: 50px;
      border: 1px solid #555;
      border-radius: 12px;
      background: #202020;
      color: #fff;
      font: 700 14px/1 system-ui,sans-serif;
      cursor: pointer;
    }

    .audio-summary {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #090909;
      color: #ccc;
      font: 13px/1.7 ui-monospace,monospace;
    }

    .audio-file-list {
      display: grid;
      gap: 7px;
      margin-top: 14px;
    }

    .audio-file-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 9px 10px;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      background: #0b0b0b;
      font: 12px/1.4 ui-monospace,monospace;
    }

    .audio-file-row button {
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid #555;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font: 700 12px/1 system-ui,sans-serif;
    }

    .audio-ok { color: #75f09a; }
    .audio-ng { color: #ff8585; }
    .audio-loading { color: #ffd400; }

    .waiting-text {
      min-height: 1.5em;
      margin-top: 5vh;
      color: var(--muted);
      font-size: clamp(16px, 2.5vw, 28px);
      letter-spacing: .1em;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 8vh 5vw 5vw;
      background:
        radial-gradient(circle at center, rgba(28,50,65,.38), rgba(0,0,0,.92) 70%),
        rgba(0,0,0,.9);
    }

    .video-overlay.active { display: flex; }

    .video-shell {
      position: relative;
      width: min(88vw, 1100px);
      padding: 18px;
      border: 2px solid #74dbff;
      border-radius: 18px;
      background: rgba(4,13,18,.92);
      box-shadow:
        0 0 0 4px rgba(116,219,255,.12),
        0 0 55px rgba(44,184,255,.28),
        inset 0 0 40px rgba(44,184,255,.08);
      clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
    }

    .video-shell::before,
    .video-shell::after {
      content: "";
      position: absolute;
      z-index: 2;
      width: 92px;
      height: 3px;
      background: #74dbff;
      box-shadow: 0 0 14px #74dbff;
    }

    .video-shell::before { top: 8px; left: 34px; }
    .video-shell::after { right: 34px; bottom: 8px; }

    .video-title {
      margin: 0 0 12px;
      color: #9ee8ff;
      font-family: ui-monospace, monospace;
      font-size: clamp(12px, 1.7vw, 18px);
      letter-spacing: .22em;
      text-align: left;
    }

    .video-shell video {
      display: block;
      width: 100%;
      max-height: 72vh;
      border: 1px solid rgba(116,219,255,.35);
      border-radius: 8px;
      background: #000;
    }

    .broken {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      overflow: hidden;
      background: #050505;
    }

    .broken.active { display: block; }

    .broken::before {
      content: "";
      position: absolute;
      inset: -30%;
      background:
        repeating-linear-gradient(0deg, transparent 0 4px, rgba(255,255,255,.08) 5px 6px),
        linear-gradient(90deg, rgba(255,0,0,.13), transparent 35%, rgba(0,170,255,.12));
      animation: noiseMove .14s steps(2) infinite;
    }

    .broken-message {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 90%;
      transform: translate(-50%,-50%);
      color: #ff3838;
      font-family: ui-monospace, monospace;
      font-size: clamp(34px, 8vw, 100px);
      font-weight: 900;
      letter-spacing: .08em;
      text-shadow: 4px 0 #0ff, -4px 0 #f0f;
      animation: glitch .16s infinite;
    }

    .broken-sub {
      display: block;
      margin-top: 22px;
      color: #ddd;
      font-size: clamp(14px, 2.2vw, 28px);
      letter-spacing: .22em;
    }

    @keyframes noiseMove {
      0% { transform: translate(0,0); }
      25% { transform: translate(3%,-2%); }
      50% { transform: translate(-2%,3%); }
      75% { transform: translate(1%,-3%); }
    }

    @keyframes glitch {
      0%, 100% { transform: translate(-50%,-50%) skew(0deg); opacity: 1; }
      20% { transform: translate(-51%,-49%) skew(2deg); }
      40% { transform: translate(-49%,-52%) skew(-3deg); opacity: .7; }
      60% { transform: translate(-52%,-48%) skew(1deg); }
      80% { transform: translate(-48%,-51%) skew(-2deg); }
    }

    .status {
      position: fixed;
      right: 14px;
      bottom: 10px;
      z-index: 250;
      color: #444;
      font-size: 11px;
    }

    .error {
      position: fixed;
      z-index: 300;
      inset: auto 20px 20px;
      display: none;
      padding: 12px 16px;
      border: 1px solid #633;
      border-radius: 10px;
      background: #211;
      color: #faa;
      font-size: 13px;
    }


    /* 判定ボタンと同時に表示するNG行動・解答ルール */
    .ng-screen {
      width: min(900px, 90vw);
      display: none;
      margin: clamp(20px, 4vh, 42px) auto 0;
    }
    .ng-screen.active { display: block; }
    .ng-panel {
      display: grid;
      gap: clamp(14px, 2.2vh, 24px);
    }
    .ng-card {
      position: relative;
      min-height: clamp(88px, 14vh, 132px);
      display: grid;
      place-items: center;
      padding: 28px 24px 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.26);
      background: rgba(8,10,12,.94);
      clip-path: polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px);
      box-shadow: inset 0 0 0 1px rgba(255,60,60,.12), 0 0 25px rgba(255,0,0,.08);
    }
    .ng-card::after {
      content: "";
      position: absolute;
      left: 4%; right: 4%; top: 12px; height: 2px;
      z-index: 4;
      background: #ff3434;
      box-shadow: 0 0 12px #ff3434;
      pointer-events: none;
    }
    .ng-label {
      position: absolute;
      top: 16px;
      left: 20px;
      z-index: 5;
      color: #ff7777;
      font: 700 clamp(12px,1.6vw,16px)/1 ui-monospace,monospace;
      letter-spacing: .16em;
    }
    .ng-text {
      position: relative;
      z-index: 2;
      padding-top: 12px;
      color: #fff;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(22px, 3.7vw, 42px);
      font-weight: 700;
      line-height: 1.45;
      letter-spacing: .06em;
      text-align: center;
      text-shadow: 0 0 16px rgba(255,255,255,.18);
    }
    .ng-card.masked .ng-text { opacity: 0; }
    .ng-mask {
      position: absolute;
      inset: 0;
      z-index: 3;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.16) 0 2px, transparent 2px 6px),
        repeating-linear-gradient(90deg, rgba(255,0,0,.12) 0 4px, rgba(0,170,255,.12) 4px 8px),
        #090a0b;
    }
    .ng-card.revealing .ng-mask {
      animation: ngReveal .95s steps(12) forwards;
    }
    .ng-card.revealing .ng-text {
      animation: ngTextReveal .95s .1s both;
    }
    .ng-card.revealed .ng-mask { display:none; }
    .ng-rule-card {
      display:none;
      border-color: rgba(65,180,255,.55);
      box-shadow: inset 0 0 0 1px rgba(65,180,255,.12), 0 0 25px rgba(0,140,255,.10);
    }
    .ng-rule-card.visible { display:grid; animation: ruleAppear .45s ease-out both; }
    .ng-rule-card::after { background:#55c8ff; box-shadow:0 0 12px #55c8ff; }
    .ng-rule-card .ng-label { color:#8edcff; }
    @keyframes ngReveal {
      0% { clip-path: inset(0 0 0 0); opacity:1; }
      75% { clip-path: inset(0 0 78% 0); opacity:.9; }
      100% { clip-path: inset(0 0 100% 0); opacity:0; }
    }
    @keyframes ngTextReveal {
      0% { opacity:0; filter:blur(10px); }
      60% { opacity:.55; filter:blur(3px); }
      100% { opacity:1; filter:blur(0); }
    }
    @keyframes ruleAppear {
      from { opacity:0; }
      to { opacity:1; }
    }

  </style>
</head>
<body>
  <div id="timer" class="timer">20:00</div>

  <main id="deadScreen" class="screen active">
    <div class="battery-wrap"><div class="battery-low"></div></div>
    <div class="dead-text">BATTERY EMPTY</div>
  </main>

  <main id="judgeScreen" class="screen">
    <div class="judge-label">SELECT WORD SYSTEM</div>
    <div class="judge-console"><div class="judge-ring"><button id="judgeButton" class="judge-button" type="button">判 定</button></div></div>
    <div id="waitingText" class="waiting-text"></div>

    <section id="ngScreen" class="ng-screen" aria-live="polite">
      <div class="ng-panel">
        <div id="ngActionCard" class="ng-card masked">
          <div class="ng-label">NG行動</div>
          <div class="ng-text">解答ボードに黒ペンで書く</div>
          <div class="ng-mask" aria-hidden="true"></div>
        </div>
        <div id="answerRuleCard" class="ng-card ng-rule-card">
          <div class="ng-label">NG行動2</div>
          <div class="ng-text">解答ボードに記入して解答する</div>
        </div>
      </div>
    </section>
  </main>

  <section id="videoOverlay" class="video-overlay">
    <div class="video-shell">
      <div class="video-title">INCOMING TRANSMISSION</div>
      <video id="eventVideo" playsinline></video>
    </div>
  </section>

  <section id="brokenScreen" class="broken">
    <div class="broken-message">
      SYSTEM FAILURE
      <span class="broken-sub">CONNECTION LOST / FATAL ERROR</span>
    </div>
  </section>

  <section id="attentionScreen" class="manual-screen">
    <div class="attention-message">画面に注目してください</div>
  </section>

  <section id="successScreen" class="manual-screen">
    <img class="result-poster" src="images/success.png" alt="脱出成功">
    <div id="clearTimeOverlay" class="clear-time-overlay" aria-label="クリア時間">
      <span id="clearTimeMinute" class="clear-time-part clear-time-minute">--</span>
      <span id="clearTimeSecond" class="clear-time-part clear-time-second">--</span>
    </div>
  </section>

  <section id="failureScreen" class="manual-screen">
    <img class="result-poster" src="images/failed.png" alt="脱出失敗">
  </section>



  <button id="audioUnlock" class="audio-unlock hidden" type="button">音声設定を開く</button>

  <section id="audioSetup" class="audio-setup">
    <div class="audio-card">
      <h2>音声環境セットアップ</h2>
      <p>
        この端末では、最初に画面をタップして音声を許可する必要があります。
        下のボタンを押すと、内蔵テスト音の再生と全MP3ファイルの読み込み確認を行います。
      </p>
      <button id="setupAudioButton" class="audio-main-button" type="button">音声を有効化して診断する</button>
      <div class="audio-actions">
        <button id="testToneButton" class="audio-secondary-button" type="button">内蔵テスト音</button>

      </div>

  <script type="module">

    const firebaseConfig = {

      authDomain: "select-word-01.firebaseapp.com",
      databaseURL: "https://select-word-01-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "select-word-01",
      storageBucket: "select-word-01.firebasestorage.app",
      messagingSenderId: "1014781061586",
      appId: "1:1014781061586:web:3ed1752379994818d5c00b"
    };

    const AUDIO_FILES = {

      correct: "audio/correct.mp3",
      incorrect: "audio/incorrect.mp3",
      human: "audio/human.mp3",
      sheep: "audio/sheep.mp3",
      dog: "audio/dog.mp3",
      cat: "audio/cat.mp3",
      horse: "audio/horse.mp3",
      cow: "audio/cow.mp3",
      crow: "audio/crow.mp3",
      tiger: "audio/tiger.mp3",

      bgm5: "audio/bgm_last5.mp3"
    };

    const BGM_KEY_BY_MODE = { normal: "bgm", last5: "bgm5" };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const roomId = new URLSearchParams(location.search).get("room") || "main";
    const roomRef = ref(db, `selectWord/rooms/${roomId}`);

    const $ = id => document.getElementById(id);

    const audioSetup = $("audioSetup");

    const audioFileList = $("audioFileList");

    let currentMode = "dead";
    let currentNgStage = "none";
    let currentTimerState = null;
    let timerInterval = null;
    let lastResultId = "";
    let lastVideoCommandId = "";
    let lastStopVideoCommandId = "";
    let lastAudioTestCommandId = "";
    let lastCustomEffectCommandId = "";
    let isPlayingResult = false;
    let requestedBgmMode = "none";
    let requestedBgmVolume = 0.7;
    let requestedEffectVolume = 0.8;
    let lastBgmCommandId = "";
    let bgmSuppressed = false;

    // 充電切れ画面の隠し通信
    let deadScreenTapCount = 0;
    let deadScreenTapResetTimer = null;
    let secretVideoPlaying = false;
    const SECRET_TAP_COUNT = 10;
    const SECRET_TAP_TIMEOUT_MS = 5000;
    const SECRET_VIDEO_SRC = "video/seikai1.mp4";

    class AudioEngine {
      constructor(files) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        this.ctx = AudioContextClass
          ? new AudioContextClass({ latencyHint: "playback" })
          : null;
        this.files = files;
        this.buffers = new Map();
        this.statuses = new Map();
        this.effectGain = null;
        this.bgmGain = null;
        this.masterCompressor = null;
        this.bgmSource = null;
        this.bgmKey = null;
        this.bgmOffset = 0;
        this.bgmStartedAt = 0;
        this.ready = false;

        if (this.ctx) {
          this.effectGain = this.ctx.createGain();
          this.bgmGain = this.ctx.createGain();
          this.masterCompressor = this.ctx.createDynamicsCompressor();

          // 音割れ防止。大きい音だけ自然に抑える
          this.masterCompressor.threshold.value = -8;
          this.masterCompressor.knee.value = 18;
          this.masterCompressor.ratio.value = 4;
          this.masterCompressor.attack.value = 0.008;
          this.masterCompressor.release.value = 0.22;

          this.effectGain.connect(this.masterCompressor);
          this.bgmGain.connect(this.masterCompressor);
          this.masterCompressor.connect(this.ctx.destination);

          this.setEffectVolume(.8);
          this.setBgmVolume(.7);
        }
      }

      setEffectVolume(value) {
        const v = Math.max(0, Math.min(1, Number(value) || 0));
        if (this.ctx && this.effectGain) {
          const now = this.ctx.currentTime;
          this.effectGain.gain.cancelScheduledValues(now);
          this.effectGain.gain.setTargetAtTime(v, now, 0.015);
        }
      }

      setBgmVolume(value) {
        const v = Math.max(0, Math.min(1, Number(value) || 0));
        if (this.ctx && this.bgmGain) {
          const now = this.ctx.currentTime;
          this.bgmGain.gain.cancelScheduledValues(now);
          this.bgmGain.gain.setTargetAtTime(v, now, 0.02);
        }
      }

      async unlock() {
        if (!this.ctx) throw new Error("AudioContext非対応");
        if (this.ctx.state !== "running") await this.ctx.resume();
        await this.playTone();
        return this.ctx.state === "running";
      }

      async playTone() {
        if (!this.ctx) throw new Error("AudioContext非対応");
        if (this.ctx.state !== "running") await this.ctx.resume();

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.value = 660;
        gain.gain.setValueAtTime(0.0001, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, this.ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.24);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.26);
      }

      async loadOne(key, force = false) {
        if (!this.ctx) return false;
        if (!force && this.buffers.has(key)) return true;

        const path = this.files[key];
        this.statuses.set(key, { state: "loading", message: "読込中" });
        renderAudioStatus();

        try {
          const url = new URL(path, location.href);
          url.searchParams.set("_audio_cache", Date.now().toString());
          const response = await fetch(url.href, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const contentType = response.headers.get("content-type") || "";
          const data = await response.arrayBuffer();
          if (data.byteLength < 100) throw new Error("ファイル容量が小さすぎます");

          const buffer = await this.ctx.decodeAudioData(data.slice(0));
          this.buffers.set(key, buffer);
          this.statuses.set(key, {
            state: "ok",
            message: `${buffer.duration.toFixed(1)}秒 / ${Math.round(data.byteLength / 1024)}KB / ${contentType || "形式不明"}`
          });
          return true;
        } catch (error) {
          console.error(`音声読込失敗: ${key}`, error);
          this.buffers.delete(key);
          this.statuses.set(key, { state: "ng", message: error.message || "読込失敗" });
          return false;
        } finally {
          renderAudioStatus();
        }
      }

      async loadAll(force = false) {
        if (!this.ctx) throw new Error("AudioContext非対応");
        const keys = Object.keys(this.files);
        await Promise.all(keys.map(key => this.loadOne(key, force)));
        this.ready = keys.every(key => this.buffers.has(key));
        return this.ready;
      }

      async playEffect(key) {
        if (!this.ctx || this.ctx.state !== "running") throw new Error("音声が未許可です");
        if (!this.buffers.has(key)) {
          const loaded = await this.loadOne(key, true);
          if (!loaded) throw new Error(`${this.files[key]} を読み込めません`);
        }

        return new Promise(resolve => {
          const source = this.ctx.createBufferSource();
          source.buffer = this.buffers.get(key);
          source.connect(this.effectGain);
          source.addEventListener("ended", resolve, { once: true });
          source.start();
        });
      }

      stopBgm(keepPosition = false) {
        if (this.bgmSource) {
          if (keepPosition && this.bgmKey && this.bgmStartedAt) {
            const buffer = this.buffers.get(this.bgmKey);
            if (buffer?.duration) {
              this.bgmOffset =
                (this.bgmOffset + (this.ctx.currentTime - this.bgmStartedAt)) % buffer.duration;
            }
          }
          try { this.bgmSource.stop(); } catch (_) {}
          try { this.bgmSource.disconnect(); } catch (_) {}
        }
        this.bgmSource = null;
        this.bgmStartedAt = 0;
        if (!keepPosition) this.bgmOffset = 0;
      }

      async playBgm(key, { restart = false } = {}) {
        if (!this.ctx || this.ctx.state !== "running") throw new Error("音声が未許可です");
        if (!this.buffers.has(key)) {
          const loaded = await this.loadOne(key, true);
          if (!loaded) throw new Error(`${this.files[key]} を読み込めません`);
        }

        const changed = this.bgmKey !== key;
        if (restart || changed) this.bgmOffset = 0;

        this.stopBgm(false);
        this.bgmKey = key;

        const buffer = this.buffers.get(key);
        const source = this.ctx.createBufferSource();
        source.buffer = buffer;
        source.loop = true;
        source.connect(this.bgmGain);

        const offset = Math.max(0, Math.min(this.bgmOffset, Math.max(0, buffer.duration - .01)));
        source.start(0, offset);

        this.bgmSource = source;
        this.bgmStartedAt = this.ctx.currentTime;
      }
    }

    const audio = new AudioEngine(AUDIO_FILES);

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function clearError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function renderAudioStatus() {
      audioFileList.innerHTML = "";
      let ok = 0;
      let ng = 0;
      let loading = 0;

      for (const [key, path] of Object.entries(AUDIO_FILES)) {
        const info = audio.statuses.get(key) || { state: "idle", message: "未確認" };
        if (info.state === "ok") ok++;
        if (info.state === "ng") ng++;
        if (info.state === "loading") loading++;

        const row = document.createElement("div");
        row.className = "audio-file-row";

        const icon = document.createElement("span");
        icon.textContent =
          info.state === "ok" ? "●" :
          info.state === "ng" ? "×" :
          info.state === "loading" ? "…" : "○";
        icon.className =
          info.state === "ok" ? "audio-ok" :
          info.state === "ng" ? "audio-ng" :
          info.state === "loading" ? "audio-loading" : "";

        const label = document.createElement("div");
        label.innerHTML = `<strong>${key}</strong><br>${path}<br><span style="color:#888">${info.message}</span>`;

        const test = document.createElement("button");
        test.type = "button";
        test.textContent = "テスト";
        test.disabled = info.state !== "ok";
        test.addEventListener("click", async () => {
          clearError();
          try {
            if (key === "bgm" || key === "bgm5") {
              audio.stopBgm(false);
              audio.bgmKey = null;
              await audio.playBgm(key, { restart: true });
              setTimeout(() => audio.stopBgm(false), 3000);
            } else {
              await audio.playEffect(key);
            }
          } catch (error) {
            showError(error.message);
          }
        });

        row.append(icon, label, test);
        audioFileList.appendChild(row);
      }

      const total = Object.keys(AUDIO_FILES).length;
      const contextState = audio.ctx?.state || "非対応";
      audioSummary.innerHTML =
        `AudioContext: <strong>${contextState}</strong><br>` +
        `成功: <strong class="audio-ok">${ok}/${total}</strong>　` +
        `失敗: <strong class="audio-ng">${ng}</strong>　` +
        `読込中: <strong class="audio-loading">${loading}</strong>`;

      closeAudioSetup.disabled = !(ok === total && audio.ctx?.state === "running");
    }

    async function setupAudio(force = true) {
      clearError();
      setupAudioButton.disabled = true;
      retryAudioButton.disabled = true;
      audioSummary.textContent = "音声を許可しています…";

      try {
        await audio.unlock();
        audio.setBgmVolume(requestedBgmVolume);
        audio.setEffectVolume(requestedEffectVolume);
        await audio.loadAll(force);

        await update(roomRef, {
          audioDevice: {
            ready: audio.ready,
            contextState: audio.ctx?.state || "unknown",
            loadedCount: audio.buffers.size,
            totalCount: Object.keys(AUDIO_FILES).length,
            updatedAt: Date.now()
          }
        });

        if (!audio.ready) {
          showError("不足しているMP3があります。赤い×のファイル名と配置を確認してください。");
        }
      } catch (error) {
        showError(`音声セットアップ失敗：${error.message}`);
      } finally {
        setupAudioButton.disabled = false;
        retryAudioButton.disabled = false;
        renderAudioStatus();
      }
    }

    setupAudioButton.addEventListener("click", () => setupAudio(true));
    retryAudioButton.addEventListener("click", () => setupAudio(true));
    testToneButton.addEventListener("click", async () => {
      try {
        await audio.unlock();
        await audio.playTone();
        renderAudioStatus();
      } catch (error) {
        showError(`内蔵テスト音を鳴らせません：${error.message}`);
      }
    });

    closeAudioSetup.addEventListener("click", () => {
      audioSetup.classList.add("hidden");
      audioUnlock.classList.remove("hidden");
    });

    forceCloseAudioSetup.addEventListener("click", () => {
      audioSetup.classList.add("hidden");
      audioUnlock.classList.remove("hidden");
    });

    audioUnlock.addEventListener("click", () => {
      audioSetup.classList.remove("hidden");
      audioUnlock.classList.add("hidden");
      renderAudioStatus();
    });

    function showScreen(mode, ngStage = currentNgStage) {
      currentMode = mode;
      currentNgStage = ngStage;

      if (mode !== "dead") {
        deadScreenTapCount = 0;
        clearTimeout(deadScreenTapResetTimer);
      }

      const isBaseScreen = ["dead", "ready", "waiting", "playing"].includes(mode);
      const showTimer = ["ready", "waiting", "playing"].includes(mode);

      timerEl.classList.toggle("visible", showTimer);
      deadScreen.classList.toggle("active", mode === "dead");
      judgeScreen.classList.toggle("active", isBaseScreen && mode !== "dead");
      attentionScreen.classList.toggle("active", mode === "attention");
      successScreen.classList.toggle("active", mode === "success");
      failureScreen.classList.toggle("active", mode === "failure");

      // NG表示は画面モードと分離。判定待ち・判定中でも表示を維持する。
      const showNg = ["masked", "revealed", "rule"].includes(ngStage) && ["ready", "waiting", "playing"].includes(mode);
      ngScreen.classList.toggle("active", showNg);

      if (ngStage === "masked") {
        ngActionCard.className = "ng-card masked";
        answerRuleCard.className = "ng-card ng-rule-card";
      } else if (ngStage === "revealed") {
        if (!ngActionCard.classList.contains("revealed")) {
          ngActionCard.className = "ng-card revealing";
          setTimeout(() => {
            if (["ready", "waiting", "playing"].includes(currentMode)) {
              ngActionCard.className = "ng-card revealed";
            }
          }, 1050);
        }
        answerRuleCard.className = "ng-card ng-rule-card";
      } else if (ngStage === "rule") {
        ngActionCard.className = "ng-card revealed";
        answerRuleCard.className = "ng-card ng-rule-card visible";
      } else {
        ngActionCard.className = "ng-card masked";
        answerRuleCard.className = "ng-card ng-rule-card";
      }

      const isManualView = ["attention", "success", "failure"].includes(mode);
      document.body.classList.toggle("manual-view", isManualView);

      const waiting = mode === "waiting";
      const playing = mode === "playing";
      judgeButton.disabled = waiting || playing;
      judgeButton.classList.toggle("pressed", waiting || playing);
      waitingText.textContent =
        waiting ? "判定を受け付けました" :
        playing ? "判定中…" : "";
    }

    async function playEffectSafe(key) {
      try {
        clearError();
        await audio.playEffect(key);
      } catch (error) {
        showError(`${AUDIO_FILES[key]}：${error.message}`);
        audioSetup.classList.remove("hidden");
        audioUnlock.classList.add("hidden");
        throw error;
      }
    }

    function pauseBgmForJudgement() {
      bgmSuppressed = true;
      audio.stopBgm(true);
    }

    async function resumeBgmAfterJudgement() {
      bgmSuppressed = false;
      if (requestedBgmMode === "none") return;

      const key = BGM_KEY_BY_MODE[requestedBgmMode];
      if (!key) return;

      try {
        await audio.playBgm(key, { restart: false });
      } catch (error) {
        showError(`BGM再開失敗：${error.message}`);
      }
    }

    async function applyBgmControl(control = {}) {
      requestedBgmVolume = Math.max(0, Math.min(1, Number(control.volume ?? .7)));
      requestedEffectVolume = Math.max(0, Math.min(2, Number(control.effectVolume ?? .8)));
      audio.setBgmVolume(requestedBgmVolume);
      audio.setEffectVolume(requestedEffectVolume);

      const commandChanged = Boolean(control.commandId && control.commandId !== lastBgmCommandId);
      if (commandChanged) lastBgmCommandId = control.commandId;

      const nextMode = control.mode || "none";
      const previousMode = requestedBgmMode;
      requestedBgmMode = nextMode;

      if (nextMode === "none") {
        audio.stopBgm(false);
        audio.bgmKey = null;
        return;
      }

      if (bgmSuppressed) return;
      if (!commandChanged && previousMode === nextMode && audio.bgmSource) return;

      const key = BGM_KEY_BY_MODE[nextMode];
      if (!key) return;

      try {
        await audio.playBgm(key, {
          restart: Boolean(control.restart) || previousMode !== nextMode
        });
      } catch (error) {
        showError(`BGM再生失敗：${error.message}`);
        audioSetup.classList.remove("hidden");
        audioUnlock.classList.add("hidden");
      }
    }

    async function playResult(result) {
      if (isPlayingResult || !result?.id || result.id === lastResultId) return;
      isPlayingResult = true;
      lastResultId = result.id;
      pauseBgmForJudgement();

      await update(roomRef, { mode: "playing" });
      showScreen("playing", currentNgStage);

      try {
        const sequence = Array.isArray(result.sequence) ? result.sequence : [];
        for (let i = 0; i < sequence.length; i++) {
          await playEffectSafe(sequence[i]);
          if (i < sequence.length - 1) await sleep(1000);
        }
        await sleep(1000);
      } catch (_) {
      } finally {
        if (!result.isCorrect) {
          await resumeBgmAfterJudgement();
        } else {
          bgmSuppressed = false;
          audio.stopBgm(false);
        }
        // 結果音声終了後は判定画面へ戻すだけ。演出画面は運営が手動で切り替える。
        await update(roomRef, { mode: "ready", requestAt: null, result: null });
        showScreen("ready", currentNgStage);
        isPlayingResult = false;
      }
    }


    async function playSecretVideo() {
      if (secretVideoPlaying || currentMode !== "dead") return;
      secretVideoPlaying = true;

      try {
        await playEffectSafe("incoming");

        eventVideo.src = SECRET_VIDEO_SRC;
        eventVideo.load();
        eventVideo.currentTime = 0;
        videoOverlay.classList.add("active");

        await eventVideo.play();

        await new Promise(resolve => {
          eventVideo.addEventListener("ended", resolve, { once: true });
          eventVideo.addEventListener("error", resolve, { once: true });
        });
      } catch (error) {
        showError(`隠し通信の再生に失敗しました：${error.message}`);
      } finally {
        eventVideo.pause();
        eventVideo.removeAttribute("src");
        eventVideo.load();
        videoOverlay.classList.remove("active");
        secretVideoPlaying = false;
        deadScreenTapCount = 0;
      }
    }

    function registerDeadScreenTap() {
      if (currentMode !== "dead" || secretVideoPlaying) return;

      deadScreenTapCount += 1;
      clearTimeout(deadScreenTapResetTimer);

      deadScreenTapResetTimer = setTimeout(() => {
        deadScreenTapCount = 0;
      }, SECRET_TAP_TIMEOUT_MS);

      if (deadScreenTapCount >= SECRET_TAP_COUNT) {
        clearTimeout(deadScreenTapResetTimer);
        deadScreenTapCount = 0;
        playSecretVideo();
      }
    }

    deadScreen.addEventListener("pointerup", registerDeadScreenTap);

    async function playVideoCommand(command) {
      if (!command?.id || command.id === lastVideoCommandId) return;
      lastVideoCommandId = command.id;

      try {
        await playEffectSafe("incoming");
        eventVideo.src = command.src || "video/event.mp4";
        eventVideo.load();
        videoOverlay.classList.add("active");
        eventVideo.currentTime = 0;
        await eventVideo.play();

        await new Promise(resolve => {
          eventVideo.addEventListener("ended", resolve, { once: true });
          eventVideo.addEventListener("error", resolve, { once: true });
        });
      } catch (error) {
        showError(`動画再生失敗：${error.message}`);
      } finally {
        eventVideo.pause();
        eventVideo.removeAttribute("src");
        eventVideo.load();
        videoOverlay.classList.remove("active");
        await update(roomRef, { videoCommand: null });
      }
    }


    function stopVideoPlayback(command) {
      if (!command?.id || command.id === lastStopVideoCommandId) return;
      lastStopVideoCommandId = command.id;

      eventVideo.pause();
      eventVideo.removeAttribute("src");
      eventVideo.load();
      videoOverlay.classList.remove("active");

      update(roomRef, { stopVideoCommand: null }).catch(console.error);
    }

    async function runCustomEffect(command) {
      if (!command?.id || command.id === lastCustomEffectCommandId) return;
      lastCustomEffectCommandId = command.id;

      const raw = String(command.filename || "").trim();
      if (!raw) return;
      const safeName = raw.replace(/^audio\//, "").replace(/[^a-zA-Z0-9._-]/g, "");
      if (!safeName || !safeName.toLowerCase().endsWith(".mp3")) {
        await update(roomRef, { customEffectCommand: null });
        showError("効果音のファイル名が不正です。");
        return;
      }

      try {
        await audio.ensureContext();
        const response = await fetch(`audio/${safeName}?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const buffer = await audio.ctx.decodeAudioData(await response.arrayBuffer());
        const source = audio.ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(audio.effectGain);
        source.start(0);
        await new Promise(resolve => { source.onended = resolve; });
      } catch (error) {
        showError(`効果音 ${safeName} の再生に失敗しました：${error.message}`);
      } finally {
        await update(roomRef, { customEffectCommand: null });
      }
    }

    async function runAudioTest(command) {
      if (!command?.id || command.id === lastAudioTestCommandId) return;
      lastAudioTestCommandId = command.id;

      try {
        if (command.key === "tone") {
          await audio.playTone();
        } else if (command.key === "bgm" || command.key === "bgm5") {
          await audio.playBgm(command.key, { restart: true });
          await sleep(3000);
          audio.stopBgm(false);
          audio.bgmKey = null;
          await resumeBgmAfterJudgement();
        } else if (AUDIO_FILES[command.key]) {
          await playEffectSafe(command.key);
        }
        await update(roomRef, {
          audioTestResult: {
            id: command.id,
            ok: true,
            key: command.key,
            at: Date.now()
          },
          audioTestCommand: null
        });
      } catch (error) {
        await update(roomRef, {
          audioTestResult: {
            id: command.id,
            ok: false,
            key: command.key,
            message: error.message,
            at: Date.now()
          },
          audioTestCommand: null
        });
      }
    }

    function formatTime(seconds) {
      const safe = Math.max(0, Math.ceil(seconds));
      return `${String(Math.floor(safe / 60)).padStart(2,"0")}:${String(safe % 60).padStart(2,"0")}`;
    }

    function updateTimer() {
      if (!currentTimerState?.startedAt || currentTimerState.status !== "running") {
        const remaining = currentTimerState?.remainingSeconds ?? GAME_SECONDS;
        timerEl.textContent = formatTime(remaining);
        timerEl.classList.toggle("warning", remaining <= 300 && remaining > 0);
        return;
      }

      const elapsed = Math.floor((Date.now() - currentTimerState.startedAt) / 1000);
      const duration = currentTimerState.durationSeconds || GAME_SECONDS;
      const remaining = Math.max(0, duration - elapsed);

      timerEl.textContent = formatTime(remaining);
      timerEl.classList.toggle("warning", remaining <= 300);

      if (remaining <= 0) {
        audio.stopBgm(false);
        requestedBgmMode = "none";
        brokenScreen.classList.add("active");
        update(roomRef, {
          timer: { ...currentTimerState, status: "ended", remainingSeconds: 0 },
          mode: "broken",
          bgmControl: {
            mode: "none",
            volume: requestedBgmVolume,
            effectVolume: requestedEffectVolume,
            commandId: `${Date.now()}-timeout`
          }
        }).catch(console.error);
      }
    }

    judgeButton.addEventListener("click", async () => {
      if (currentMode !== "ready") return;

      judgeButton.disabled = true;
      judgeButton.classList.add("pressed");
      waitingText.textContent = "判定を受け付けました";
      pauseBgmForJudgement();

      try {
        await playEffectSafe("button");
        await update(roomRef, {
          mode: "waiting",
          requestAt: Date.now(),
          result: null
        });
      } catch (_) {
        judgeButton.disabled = false;
        judgeButton.classList.remove("pressed");
        waitingText.textContent = "";
        await resumeBgmAfterJudgement();
      }
    });

    onValue(roomRef, snapshot => {
      const state = snapshot.val() || {};
      const mode = state.mode || "dead";

      if (mode !== "broken") showScreen(mode, state.ngStage || "none");
      else {
        showScreen("none");
        timerEl.classList.add("visible");
      }

      brokenScreen.classList.toggle("active", mode === "broken");
      const clearDisplay = state.clearRecord?.display || "--:--";
      const [clearMinute = "--", clearSecond = "--"] = clearDisplay.split(":");
      clearTimeMinute.textContent = clearMinute;
      clearTimeSecond.textContent = clearSecond;
      clearTimeOverlay.setAttribute("aria-label", `クリア時間 ${clearMinute}分${clearSecond}秒`);

      currentTimerState = state.timer || { status: "idle", remainingSeconds: GAME_SECONDS };
      updateTimer();
      applyBgmControl(state.bgmControl || {
        mode: "none",
        volume: .7,
        effectVolume: .8
      });

      if (!timerInterval) timerInterval = setInterval(updateTimer, 250);
      if (state.result) playResult(state.result);
      if (state.videoCommand) playVideoCommand(state.videoCommand);
      if (state.stopVideoCommand) stopVideoPlayback(state.stopVideoCommand);
      if (state.audioTestCommand) runAudioTest(state.audioTestCommand);
      if (state.customEffectCommand) runCustomEffect(state.customEffectCommand);

      status.textContent =
        `ROOM: ${roomId} / ${mode} / AUDIO: ${audio.ctx?.state || "unsupported"} / ${audio.buffers.size}/${Object.keys(AUDIO_FILES).length}`;
    }, () => showError("Firebaseへの接続に失敗しました。"));

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && audio.ctx?.state === "suspended") {
        audioSetup.classList.remove("hidden");
        audioUnlock.classList.add("hidden");
        renderAudioStatus();
      }
    });

    renderAudioStatus();
  </script>
</body>
</html>
