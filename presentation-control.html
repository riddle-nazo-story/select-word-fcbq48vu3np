<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SELECT WORD｜プレゼン設定・操作</title>
<style>
:root{color-scheme:dark;--bg:#080808;--panel:#151515;--panel2:#0d0d0d;--line:#333;--text:#f5f5f5;--muted:#aaa;--accent:#ffd400;--danger:#ff7c7c;--ok:#63e39b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}.wrap{max-width:900px;margin:auto;padding:16px}.top{position:sticky;top:0;z-index:20;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);padding:10px 0 14px}.title{font-weight:1000;letter-spacing:.08em;font-size:22px}.sub{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.6}.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:15px;margin:12px 0}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}button,input,select{font:inherit}button{min-height:48px;border:1px solid #505050;border-radius:12px;background:#202020;color:#fff;font-weight:800;padding:8px 12px;cursor:pointer}button.primary{background:var(--accent);color:#111;border-color:var(--accent)}button.danger{color:#ffc0c0;border-color:#744}button.green{color:#baffd4;border-color:#376449}input,select{width:100%;min-height:46px;border:1px solid #444;border-radius:10px;background:#090909;color:#fff;padding:0 11px}label{font-size:12px;color:#bbb;display:block;margin:8px 0 6px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tabs button.active{border-color:var(--accent);color:var(--accent);background:#252006}.status{font-size:12px;color:#ccc;padding:10px;border:1px solid #333;background:#0a0a0a;border-radius:10px;line-height:1.7}.slides{display:grid;gap:10px}.card{border:1px solid #383838;background:var(--panel2);border-radius:14px;padding:12px}.card.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}.cardhead{display:flex;justify-content:space-between;align-items:center;gap:8px}.badge{color:var(--accent);font-size:12px;font-weight:900}.small{font-size:11px;color:var(--muted);line-height:1.6}.stop-list{display:grid;gap:7px;margin-top:8px}.stop-row{display:grid;grid-template-columns:1fr 48px;gap:7px}.tools{display:flex;gap:7px;flex-wrap:wrap}.tools button{min-height:38px;padding:5px 10px;font-size:12px}.section-title{font-size:14px;margin:0 0 10px}.savebar{display:grid;grid-template-columns:1fr 1fr;gap:8px}.notice{color:#ffe880;font-size:12px;line-height:1.7}.hide{display:none!important}@media(max-width:620px){.row,.row3{grid-template-columns:1fr}.savebar{grid-template-columns:1fr 1fr}.wrap{padding:10px}}
</style>
</head><body><main class="wrap">
<div class="top"><div class="title">SELECT WORD PRESENTATION</div><div class="sub">設定はFirebaseとこの端末に保存。画像・動画はGitHub Pages上のパスを入力します。</div></div>
<section class="panel"><div class="row"><div><label>ルームID</label><input id="roomInput" value="main"></div><div style="align-self:end"><button id="connectBtn" class="primary" style="width:100%">このルームに接続</button></div></div><div id="saveStatus" class="status" style="margin-top:10px">接続準備中</div></section>
<section class="panel"><h2 class="section-title">公演モード</h2><div class="tabs"><button id="storyTab">ストーリーあり</button><button id="noStoryTab">ストーリーなし</button></div></section>
<section class="panel"><h2 class="section-title">本番操作</h2><div class="row3"><button id="prevBtn">← 前へ</button><button id="showBtn" class="primary">現在を表示</button><button id="nextBtn">次へ →</button></div><div class="row" style="margin-top:8px"><button id="blackBtn">黒画面</button><button id="waitingBtn">待機画面</button></div><div id="videoControls" style="margin-top:12px"><div class="row"><button id="playBtn" class="primary">最初から再生</button><button id="resumeBtn" class="green">続きから再生</button><button id="pauseBtn">一時停止</button><button id="stopBtn" class="danger">停止・先頭へ</button></div></div><div id="remoteStatus" class="status" style="margin-top:10px">表示端末：未接続</div></section>
<section class="panel"><h2 class="section-title">スライド編集</h2><p class="notice">例：<b>slides/story/01.jpg</b>、<b>video/story/opening.mp4</b>。パソコンとスマホで同じサイトを開くため、端末内のファイルを直接選ぶ方式ではなく、サイト内のパスを設定します。</p><div id="slidesList" class="slides"></div><button id="addSlideBtn" style="width:100%;margin-top:10px">＋ スライドを追加</button></section>
<section class="panel"><h2 class="section-title">保存・バックアップ</h2><div class="savebar"><button id="saveBtn" class="primary">設定を保存</button><button id="reloadBtn">保存済みを再読込</button><button id="exportBtn">JSONを書き出す</button><button id="importBtn">JSONを読み込む</button></div><input id="importFile" type="file" accept="application/json,.json" class="hide"><p class="small">自動停止時刻も含めて保存されます。並び替え・モード別スライドもすべてJSONに入ります。</p></section>
</main>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getDatabase,ref,onValue,set,update,get}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyA-f7Dplo95j3NYBCXHSxEBGhFXgAa35lU",authDomain:"select-word-01.firebaseapp.com",databaseURL:"https://select-word-01-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"select-word-01",storageBucket:"select-word-01.firebasestorage.app",messagingSenderId:"1014781061586",appId:"1:1014781061586:web:3ed1752379994818d5c00b"};
const db=getDatabase(initializeApp(firebaseConfig)); const $=id=>document.getElementById(id);
const defaults={version:2,story:[{id:crypto.randomUUID(),title:"待機画像",type:"image",src:"slides/story/01-waiting.jpg",stopPoints:[]},{id:crypto.randomUUID(),title:"導入映像",type:"video",src:"video/story/opening.mp4",stopPoints:[15,38,60]}],noStory:[{id:crypto.randomUUID(),title:"待機画像",type:"image",src:"slides/no-story/01-waiting.jpg",stopPoints:[]},{id:crypto.randomUUID(),title:"説明映像",type:"video",src:"video/no-story/introduction.mp4",stopPoints:[12,27,45]}]};
let room=new URLSearchParams(location.search).get("room")||localStorage.getItem("sw-pres-room")||"main";let mode="story",index=0,config=structuredClone(defaults),baseRef,statusUnsub=null;$("roomInput").value=room;
const storageKey=()=>`sw-pres-config-${room}`;const nowId=p=>`${p}-${Date.now()}-${Math.random().toString(36).slice(2)}`;const list=()=>config[mode]||[];const slide=()=>list()[index]||null;
function fmt(s){s=Math.max(0,Number(s)||0);return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`}
function parse(t){t=String(t).trim();if(/^\d+(\.\d+)?$/.test(t))return Number(t);let p=t.split(":").map(Number);if(p.some(Number.isNaN))return null;if(p.length===2)return p[0]*60+p[1];if(p.length===3)return p[0]*3600+p[1]*60+p[2];return null}
function normalize(c){let out={version:2,story:[],noStory:[]};for(const m of["story","noStory"]){out[m]=(Array.isArray(c?.[m])?c[m]:[]).map(x=>({id:x.id||crypto.randomUUID(),title:String(x.title||"名称未設定"),type:["image","video","black","waiting"].includes(x.type)?x.type:"image",src:String(x.src||""),stopPoints:[...new Set((x.stopPoints||[]).map(Number).filter(Number.isFinite).filter(v=>v>=0))].sort((a,b)=>a-b)}))}return out}
function addStop(container,value=""){let r=document.createElement("div");r.className="stop-row";r.innerHTML=`<input inputmode="numeric" placeholder="00:15" value="${value}"><button class="danger" type="button">×</button>`;r.querySelector("button").onclick=()=>{r.remove();syncFromDOM()};r.querySelector("input").onchange=syncFromDOM;container.append(r)}
function syncFromDOM(){document.querySelectorAll(".card").forEach((card,i)=>{let s=list()[i];if(!s)return;s.title=card.querySelector(".titleInput").value.trim()||"名称未設定";s.type=card.querySelector(".typeSelect").value;s.src=card.querySelector(".srcInput").value.trim();s.stopPoints=[...card.querySelectorAll(".stop-list input")].map(x=>parse(x.value)).filter(Number.isFinite).sort((a,b)=>a-b)});renderTabsOnly()}
function renderTabsOnly(){$("storyTab").classList.toggle("active",mode==="story");$("noStoryTab").classList.toggle("active",mode==="noStory");$("videoControls").classList.toggle("hide",slide()?.type!=="video")}
function render(){if(index>=list().length)index=Math.max(0,list().length-1);renderTabsOnly();$("slidesList").innerHTML="";list().forEach((s,i)=>{let card=document.createElement("div");card.className="card"+(i===index?" current":"");card.innerHTML=`<div class="cardhead"><span class="badge">SLIDE ${i+1}</span><div class="tools"><button data-act="select">選択</button><button data-act="up">↑</button><button data-act="down">↓</button><button data-act="delete" class="danger">削除</button></div></div><label>表示名</label><input class="titleInput" value="${esc(s.title)}"><label>種類</label><select class="typeSelect"><option value="image">画像</option><option value="video">動画</option><option value="black">黒画面</option><option value="waiting">待機画面</option></select><div class="srcWrap"><label>ファイルパス</label><input class="srcInput" value="${esc(s.src)}" placeholder="slides/story/01.jpg"></div><div class="stopWrap"><label>自動停止時刻</label><div class="stop-list"></div><button data-act="addStop" style="width:100%;margin-top:7px">＋ 停止位置を追加</button></div>`;card.querySelector(".typeSelect").value=s.type;let stops=card.querySelector(".stop-list");(s.stopPoints.length?s.stopPoints:[""]).forEach(v=>addStop(stops,v===""?"":fmt(v)));const toggle=()=>{let t=card.querySelector(".typeSelect").value;card.querySelector(".srcWrap").classList.toggle("hide",!["image","video"].includes(t));card.querySelector(".stopWrap").classList.toggle("hide",t!=="video")};toggle();card.querySelector(".typeSelect").onchange=()=>{syncFromDOM();toggle()};card.querySelectorAll("input").forEach(x=>x.onchange=syncFromDOM);card.onclick=e=>{let a=e.target.dataset.act;if(!a)return;syncFromDOM();if(a==="select"){index=i;sendState();render()}if(a==="up"&&i>0){[list()[i-1],list()[i]]=[list()[i],list()[i-1]];index=i-1;render()}if(a==="down"&&i<list().length-1){[list()[i+1],list()[i]]=[list()[i],list()[i+1]];index=i+1;render()}if(a==="delete"&&confirm("このスライドを削除しますか？")){list().splice(i,1);index=Math.min(index,list().length-1);render()}if(a==="addStop")addStop(stops,"")};$("slidesList").append(card)});if(!list().length)$("slidesList").innerHTML='<div class="status">スライドがありません。「スライドを追加」を押してください。</div>'}
function esc(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function connect(){room=$("roomInput").value.trim()||"main";localStorage.setItem("sw-pres-room",room);history.replaceState(null,"",`${location.pathname}?room=${encodeURIComponent(room)}`);baseRef=ref(db,`selectWord/rooms/${room}/presentation`);$("saveStatus").textContent=`ルーム「${room}」に接続中…`;let snap=await get(ref(db,`selectWord/rooms/${room}/presentation/config`));if(snap.exists())config=normalize(snap.val());else{let local=localStorage.getItem(storageKey());if(local)try{config=normalize(JSON.parse(local))}catch{}}render();if(statusUnsub)statusUnsub();statusUnsub=onValue(ref(db,`selectWord/rooms/${room}/presentation/displayStatus`),s=>{let v=s.val();$("remoteStatus").innerHTML=v?.ready?`表示端末：<b style="color:var(--ok)">接続済み</b><br>画面：${v.displayMode||"-"}／再生：${v.playbackState||"-"}／位置：${fmt(v.currentTime||0)}`:"表示端末：未接続または開始前"});$("saveStatus").textContent=`接続済み：${room}`}
async function saveConfig(){syncFromDOM();config=normalize(config);localStorage.setItem(storageKey(),JSON.stringify(config));await set(ref(db,`selectWord/rooms/${room}/presentation/config`),config);$("saveStatus").textContent=`保存しました：${new Date().toLocaleTimeString()}`;render()}
async function sendState(extra={}){if(!baseRef)return;await update(baseRef,{mode,index,displayMode:"slide",updatedAt:Date.now(),...extra})}
async function cmd(action){if(slide()?.type!=="video")return;await update(baseRef,{playback:{action,commandId:nowId(action),sessionId:action==="playFromStart"?nowId("session"):null,stopPoints:slide().stopPoints||[]}})}
$("connectBtn").onclick=connect;$("storyTab").onclick=()=>{syncFromDOM();mode="story";index=0;sendState();render()};$("noStoryTab").onclick=()=>{syncFromDOM();mode="noStory";index=0;sendState();render()};$("prevBtn").onclick=()=>{syncFromDOM();index=Math.max(0,index-1);sendState();render()};$("nextBtn").onclick=()=>{syncFromDOM();index=Math.min(list().length-1,index+1);sendState();render()};$("showBtn").onclick=()=>sendState({displayMode:"slide"});$("blackBtn").onclick=()=>update(baseRef,{displayMode:"black",updatedAt:Date.now()});$("waitingBtn").onclick=()=>update(baseRef,{displayMode:"waiting",updatedAt:Date.now()});$("playBtn").onclick=()=>cmd("playFromStart");$("resumeBtn").onclick=()=>cmd("resume");$("pauseBtn").onclick=()=>cmd("pause");$("stopBtn").onclick=()=>cmd("stop");$("addSlideBtn").onclick=()=>{syncFromDOM();list().push({id:crypto.randomUUID(),title:"新しいスライド",type:"image",src:"",stopPoints:[]});index=list().length-1;render()};$("saveBtn").onclick=saveConfig;$("reloadBtn").onclick=async()=>{if(confirm("未保存の変更を破棄して再読込しますか？"))connect()};$("exportBtn").onclick=()=>{syncFromDOM();let blob=new Blob([JSON.stringify(normalize(config),null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`select-word-presentation-${room}.json`;a.click();URL.revokeObjectURL(a.href)};$("importBtn").onclick=()=>$("importFile").click();$("importFile").onchange=async e=>{let f=e.target.files[0];if(!f)return;try{config=normalize(JSON.parse(await f.text()));index=0;render();$("saveStatus").textContent="JSONを読み込みました。保存ボタンで確定してください。"}catch(err){alert("JSONを読み込めませんでした："+err.message)}e.target.value=""};
connect();
</script></body></html>
